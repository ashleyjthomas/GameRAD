<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Friend Detective</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', Arial, sans-serif;
  background: linear-gradient(160deg, #a8edea, #fed6e3);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

#app {
  width: 100%;
  max-width: 760px;
  background: #FFFEF7;
  border-radius: 22px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 580px;
}

.prog-wrap {
  background: #F0EDE8;
  height: 13px;
  border-radius: 7px;
  margin: 12px 18px 0;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 7px;
  transition: width .55s ease;
}
.prog-label {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin: 3px 0 0;
}

.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 18px 20px;
  animation: fadeIn .35s ease;
  gap: 10px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0);   }
}

.wt {
  font-size: 40px;
  font-weight: bold;
  text-align: center;
  line-height: 1.2;
  background: linear-gradient(135deg, #f7971e, #f64f59);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.ws { font-size: 19px; color: #888; text-align: center; }

.name-wrap { text-align: center; }
.name-wrap label { display: block; font-size: 17px; color: #666; margin-bottom: 6px; }
.name-input {
  font-family: inherit;
  font-size: 20px;
  padding: 10px 18px;
  border: 3px solid #FFD200;
  border-radius: 50px;
  outline: none;
  width: 215px;
  text-align: center;
  color: #333;
  background: #FFFEF7;
}
.name-input:focus {
  border-color: #F7971E;
  box-shadow: 0 0 0 4px rgba(247,151,30,.15);
}

.btn {
  font-family: inherit;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 50px;
  padding: 12px 28px;
  cursor: pointer;
  transition: transform .1s, box-shadow .1s;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
  -webkit-tap-highlight-color: transparent;
}
.btn:active  { transform: scale(.95); }
.btn:disabled { opacity: .45; cursor: not-allowed; }

.btn-primary   { background: linear-gradient(135deg,#f7971e,#ffd200); color: white; }
.btn-secondary { background: #F0EDE8; color: #555; font-size: 15px; padding: 9px 20px; }
.btn-audio     { background: linear-gradient(135deg,#4776e6,#8e54e9); color: white; font-size: 16px; padding: 10px 22px; }

.btn-green {
  background: linear-gradient(135deg,#56ab2f,#a8e063);
  color: white;
  font-size: 24px;
  padding: 18px 0;
  box-shadow: 0 6px 20px rgba(86,171,47,.4);
  flex: 1;
  max-width: 190px;
  justify-content: center;
}
.btn-red {
  background: linear-gradient(135deg,#eb3349,#f45c43);
  color: white;
  font-size: 24px;
  padding: 18px 0;
  box-shadow: 0 6px 20px rgba(235,51,73,.4);
  flex: 1;
  max-width: 190px;
  justify-content: center;
}

.illus {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  background: #E8F4FF;
  box-shadow: inset 0 2px 8px rgba(0,0,0,.07);
}
.illus svg { display: block; width: 100%; height: auto; }

.story-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}
.pair-title { font-size: 20px; font-weight: bold; color: #333; }

.audio-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: #bbb;
}
.audio-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #ddd;
  transition: background .3s;
  flex-shrink: 0;
}
.audio-dot.on {
  background: #4CAF50;
  animation: pulse 1s ease infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1);    }
  50%      { transform: scale(1.4); }
}

.story-box {
  width: 100%;
  background: white;
  border-radius: 12px;
  padding: 13px 17px;
  font-size: 17px;
  line-height: 1.75;
  color: #333;
  border: 2px solid #F0EDE8;
}
.sent { display: inline; border-radius: 4px; padding: 1px 2px; transition: background .3s; }
.sent.hi { background: #FFF3B0; }

.story-btns {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

.q-header {
  width: 100%;
  background: linear-gradient(135deg,#4776e6,#8e54e9);
  border-radius: 11px;
  padding: 9px 15px;
  color: white;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.q-box {
  width: 100%;
  background: #F8F4FF;
  border-radius: 14px;
  padding: 16px 20px;
  font-size: 19px;
  line-height: 1.6;
  color: #333;
  border: 3px solid #C9B8F0;
  text-align: center;
  min-height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ans-row {
  display: flex;
  gap: 18px;
  justify-content: center;
  width: 100%;
}
.q-replay {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

.ex-explain {
  display: none;
  width: 100%;
  background: #E8F8E8;
  border: 2px solid #A5D6A7;
  border-radius: 12px;
  padding: 13px 17px;
  font-size: 16px;
  color: #2E7D32;
  text-align: center;
  line-height: 1.6;
}

.fb-wrap {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 999;
}
.fb-emoji {
  font-size: 96px;
  animation: popIn .85s ease forwards;
  opacity: 0;
}
@keyframes popIn {
  0%   { transform: scale(.1);  opacity: 0; }
  45%  { transform: scale(1.3); opacity: 1; }
  75%  { transform: scale(1.0); opacity: 1; }
  100% { transform: scale(.6);  opacity: 0; }
}

.trans-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px;
  text-align: center;
}
.trans-star { font-size: 96px; animation: starIn .7s ease; }
@keyframes starIn {
  0%   { transform: scale(0) rotate(-180deg); }
  70%  { transform: scale(1.25) rotate(10deg); }
  100% { transform: scale(1)   rotate(0);    }
}
.trans-msg  { font-size: 26px; font-weight: bold; color: #333; }
.trans-next { font-size: 18px; color: #999; }

.end-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
  gap: 13px;
}
.end-trophy { font-size: 100px; animation: bounceIn .8s ease; }
@keyframes bounceIn {
  0%   { transform: scale(0);    }
  60%  { transform: scale(1.18); }
  80%  { transform: scale(.94);  }
  100% { transform: scale(1);    }
}
.end-title { font-size: 34px; font-weight: bold; color: #f7971e; }
.end-sub   { font-size: 19px; color: #666; }
.end-btns  { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }

.admin-btn {
  position: fixed;
  bottom: 10px; right: 10px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(0,0,0,.13);
  border: none;
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
}
.admin-panel {
  position: fixed;
  bottom: 54px; right: 10px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  padding: 14px;
  width: 280px;
  z-index: 500;
  font-size: 13px;
  display: none;
}
.admin-panel.open { display: block; }
.admin-panel h3 {
  font-size: 15px;
  margin-bottom: 9px;
  color: #333;
  border-bottom: 1px solid #eee;
  padding-bottom: 7px;
}
.admin-log {
  max-height: 190px;
  overflow-y: auto;
  font-size: 11.5px;
  font-family: monospace;
  background: #f8f8f8;
  border-radius: 6px;
  padding: 7px;
  margin-bottom: 9px;
  white-space: pre;
  line-height: 1.5;
}

.info-box {
  font-size: 17px;
  color: #555;
  line-height: 1.8;
  max-width: 510px;
  background: #F8F4FF;
  padding: 16px 20px;
  border-radius: 14px;
  border: 3px solid #C9B8F0;
}

.error-box {
  padding: 30px;
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: auto;
  text-align: center;
}

@media (max-width: 480px) {
  .wt             { font-size: 30px; }
  .btn-green,
  .btn-red        { font-size: 20px; padding: 15px 0; }
  .q-box          { font-size: 17px; }
  .story-box      { font-size: 15px; }
  .trans-msg      { font-size: 21px; }
}

</style>
</head>
<body>

<div id="app">
  <div style="padding:50px;text-align:center;font-family:Arial,sans-serif;color:#888">
    <div style="font-size:60px">🔍</div>
    <h2>Loading Friend Detective...</h2>
    <p style="margin-top:12px">If this message does not go away, please check that
    JavaScript is enabled in your browser.</p>
  </div>
</div>

<button class="admin-btn" id="adminBtn" title="Researcher Panel">⚙️</button>
<div class="admin-panel" id="adminPanel">
  <h3>🔬 Researcher Panel</h3>
  <div class="admin-log" id="adminLog">No answers yet.</div>
  <button class="btn btn-secondary" style="width:100%;margin-bottom:7px" onclick="exportCSV()">
    📥 Download Results (CSV)
  </button>
  <button class="btn btn-secondary" style="width:100%;margin-bottom:7px" onclick="skipPair()">
    ⏭ Skip this pair
  </button>
  <button class="btn btn-secondary" style="width:100%" onclick="skipEnd()">
    ⏭ Skip to End
  </button>
</div>

let voices = [];
function initVoices() {
  voices = speechSynthesis.getVoices();
  if (!voices.length)
    speechSynthesis.addEventListener('voiceschanged', () => { voices = speechSynthesis.getVoices(); });
}
function bestVoice() {
  const prefs = ['Samantha','Karen','Moira','Google US English',
                 'Microsoft Zira - English (United States)','en-US'];
  for (const p of prefs) {
    const v = voices.find(v => v.name === p || v.lang === p);
    if (v) return v;
  }
  return voices.find(v => v.lang && v.lang.startsWith('en')) || voices[0] || null;
}

let seqGen = 0;
function speak(text, done) {
  done = done || function(){};
  if (!window.speechSynthesis) { done(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice  = bestVoice();
  u.rate   = 0.88;
  u.pitch  = 1.1;
  u.volume = 1;
  u.onend  = () => { setDot(false); done(); };
  u.onerror= () => { setDot(false); done(); };
  setDot(true);
  speechSynthesis.speak(u);
}
function speakSeq(parts, highlightCb, done) {
  const id = ++seqGen;
  let i = 0;
  function next() {
    if (seqGen !== id) return;
    if (i >= parts.length) { done(); return; }
    if (highlightCb) highlightCb(i);
    speak(parts[i], () => { i++; next(); });
  }
  next();
}
function stopSpeak() {
  seqGen++;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setDot(false);
}
function setDot(on) {
  const d = document.querySelector('.audio-dot');
  if (d) d.classList.toggle('on', on);
  const l = document.getElementById('audioLabel');
  if (l) l.textContent = on ? 'Listening...' : 'Done';
}

    p.push(`<rect x="${cx-52}" y="${cy-24}" width="104" height="28" rx="6" fill="#FFD700"/>`);
    p.push(`<rect x="${cx-52}" y="${cy-46}" width="104" height="26" rx="6" fill="#FF8C69"/>`);
    const cc=['#E74C3C','#F39C12','#27AE60','#2980B9','#9B59B6'];
    for(let i=0;i<5;i++){
      const cx2=cx-38+i*19;
      p.push(`<rect x="${cx2-3}" y="${cy-64}" width="7" height="20" rx="3" fill="${cc[i]}"/>`);
      p.push(`<ellipse cx="${cx2}" cy="${cy-65}" rx="4" ry="6" fill="#FFD700" opacity=".88"/>`);
    }
  }
  return p.join('');
}

function sceneSVG(v) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    ${bgSVG(v.scene)}${propSVG(v.scene)}
    ${kidSVG(155,GY,v.char1)}${kidSVG(445,GY,v.char2)}
  </svg>`;
}

function welcomeSVG() {
  const gy=165;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 205" style="width:100%;display:block">
    <rect x="0" y="0" width="380" height="${gy}" fill="#87CEEB"/>
    <rect x="0" y="${gy}" width="380" height="${205-gy}" fill="#7EC850"/>
    <ellipse cx="80" cy="38" rx="38" ry="19" fill="white" opacity=".9"/>
    <ellipse cx="108" cy="30" rx="27" ry="15" fill="white" opacity=".9"/>
    <ellipse cx="300" cy="44" rx="40" ry="21" fill="white" opacity=".9"/>
    <circle cx="344" cy="33" r="25" fill="#FFD700"/>
    <circle cx="190" cy="87" r="36" fill="none" stroke="#F39C12" stroke-width="6" opacity=".78"/>
    <circle cx="190" cy="87" r="28" fill="rgba(255,255,200,.3)"/>
    <line x1="215" y1="111" x2="234" y2="135" stroke="#F39C12" stroke-width="7" stroke-linecap="round"/>
    <text x="190" y="97" text-anchor="middle" font-size="26">?</text>
    ${kidSVG(74,gy,{hair:'#5C3D11',shirt:'#4ECDC4',pants:'#2C3E50',style:'short',name:''})}
    ${kidSVG(306,gy,{hair:'#D4790A',shirt:'#FF6B6B',pants:'#7D3C98',style:'pigtails',name:''})}
  </svg>`;
}

// ── RENDER ───────────────────────────────────────────────────
const app = document.getElementById('app');

function render() {
  updateAdmin();
  try {
    switch(S.phase) {
      case 'welcome':  renderWelcome();                              break;
      case 'intro':    renderIntro();                                break;
      case 'ex-story': renderStory(EXAMPLE,true);                   break;
      case 'ex-q':     renderQuestion(EXAMPLE,S.eqi,true);          break;
      case 'story':    renderStory(VIGNETTES[S.vi],false);          break;
      case 'q':        renderQuestion(VIGNETTES[S.vi],S.qi,false);  break;
      case 'trans':    renderTrans();                                break;
      case 'end':      renderEnd();                                  break;
    }
  } catch(err) {
    app.innerHTML = `<div class="error-box">
      <h2 style="color:#e74c3c">Something went wrong</h2>
      <p style="margin:10px 0">Error: <strong>${err.message}</strong></p>
      <pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:12px;
                  text-align:left;overflow:auto">${err.stack||'no stack'}</pre>
      <button class="btn btn-primary" style="margin-top:14px" onclick="resetGame()">
        Start Over
      </button>
    </div>`;
    console.error(err);
  }
}

function renderWelcome() {
  app.innerHTML = `
  <div class="screen" style="justify-content:center;text-align:center;padding-top:22px">
    <div class="wt">Friend Detective!</div>
    <div class="ws">Can you guess how friends act?</div>
    <div class="illus" style="max-width:340px">${welcomeSVG()}</div>
    <div class="name-wrap">
      <label for="cname">What is your name?</label>
      <input id="cname" class="name-input" type="text"
             placeholder="Type your name!" maxlength="22" value="${S.name}"/>
    </div>
    <button class="btn btn-primary" style="font-size:22px;padding:15px 40px;margin-top:4px"
            onclick="startGame()">
      Lets Play!
    </button>
  </div>`;
  stopSpeak();
  setTimeout(()=>{
    speak("Hi there! Welcome to Friend Detective! Can you tell me your name? When you are ready, press Lets Play!");
    const inp=document.getElementById('cname');
    if(inp) inp.addEventListener('input',e=>S.name=e.target.value);
  },350);
}

function renderIntro() {
  app.innerHTML = `
  <div class="screen" style="justify-content:center;text-align:center;gap:13px">
    <div style="font-size:52px">Detective</div>
    <div style="font-size:26px;font-weight:bold;color:#333">How to play</div>
    <div class="info-box">
      I will tell you about <strong>two kids</strong> and how they are friends.<br><br>
      Then I will ask you to <strong>guess</strong> how they might act in other situations.<br><br>
      For each question, press <strong style="color:#56ab2f">YES</strong>
      or <strong style="color:#eb3349">NO</strong>.<br><br>
      <strong>There are no wrong answers! Just make your best guess!</strong>
    </div>
    <div style="font-size:17px;color:#888">Let us try an example first!</div>
    <button class="btn btn-primary" style="font-size:20px;padding:14px 34px"
            onclick="goExStory()">Show me!</button>
  </div>`;
  stopSpeak();
  setTimeout(()=>speak("Here is how to play! I will tell you about two kids and how they are friends. Then I will ask you to guess how they might act in other situations. For each question, just press YES or NO. There are no wrong answers! Just make your best guess! Let us try an example first!"),350);
}

function renderStory(v, isEx) {
  const pct = isEx ? 0 : S.vi/VIGNETTES.length*100;
  const lbl = isEx ? 'Example' : `Pair ${S.vi+1} of ${VIGNETTES.length}`;
  app.innerHTML = `
  ${isEx?'':progHTML(pct,lbl)}
  <div class="screen" style="padding-top:${isEx?14:8}px">
    <div class="story-head">
      <div class="pair-title">Meet ${v.char1.name} and ${v.char2.name}!</div>
      <div class="audio-status">
        <div class="audio-dot"></div>
        <span id="audioLabel">Listening...</span>
      </div>
    </div>
    <div class="illus">${sceneSVG(v)}</div>
    <div class="story-box" id="storyBox">
      ${v.parts.map((s,i)=>`<span class="sent" id="snt${i}">${s} </span>`).join('')}
    </div>
    <div class="story-btns">
      <button class="btn btn-audio" onclick="replayStory()">Hear the story again</button>
      <button class="btn btn-primary" id="readyBtn" style="display:none"
              onclick="goQs(${isEx})">I am ready!</button>
    </div>
    ${isEx?`<div style="font-size:13px;color:#ccc">This is just a practice example!</div>`:''}
  </div>`;
  stopSpeak();
  setTimeout(()=>{
    speak(`Let me tell you about ${v.char1.name} and ${v.char2.name}!`, ()=>{
      speakSeq(v.parts,
        i=>{
          document.querySelectorAll('.sent').forEach(el=>el.classList.remove('hi'));
          const el=document.getElementById(`snt${i}`);
          if(el) el.classList.add('hi');
        },
        ()=>{
          document.querySelectorAll('.sent').forEach(el=>el.classList.remove('hi'));
          const rb=document.getElementById('readyBtn');
          if(rb) rb.style.display='inline-flex';
          speak(`Now let us answer some questions about ${v.char1.name} and ${v.char2.name}!`);
        }
      );
    });
  },400);
}

function replayStory() {
  const v=exPhase()?EXAMPLE:VIGNETTES[S.vi];
  stopSpeak();
  const rb=document.getElementById('readyBtn');
  if(rb) rb.style.display='none';
  speakSeq(v.parts,
    i=>{
      document.querySelectorAll('.sent').forEach(el=>el.classList.remove('hi'));
      const el=document.getElementById(`snt${i}`);
      if(el) el.classList.add('hi');
    },
    ()=>{
      document.querySelectorAll('.sent').forEach(el=>el.classList.remove('hi'));
      const rb2=document.getElementById('readyBtn');
      if(rb2) rb2.style.display='inline-flex';
    }
  );
}

function renderQuestion(v, qi, isEx) {
  const q=v.questions[qi];
  const pct=isEx?0:S.vi/VIGNETTES.length*100;
  const lbl=isEx?'Example':`Pair ${S.vi+1} of ${VIGNETTES.length}`;
  app.innerHTML = `
  ${isEx?'':progHTML(pct,lbl)}
  <div class="screen" style="padding-top:${isEx?14:8}px;gap:10px">
    <div class="q-header">
      Question ${qi+1} of 3 - ${v.char1.name} and ${v.char2.name}
    </div>
    <div class="audio-status">
      <div class="audio-dot"></div>
      <span id="audioLabel">Listen...</span>
    </div>
    <div class="illus" style="max-height:160px;overflow:hidden">${sceneSVG(v)}</div>
    <div class="q-box" id="qBox">"${q.text}"</div>
    <div class="ans-row">
      <button class="btn btn-green" id="btnY" onclick="doAnswer('YES')">YES</button>
      <button class="btn btn-red"   id="btnN" onclick="doAnswer('NO')">NO</button>
    </div>
    <div class="q-replay">
      <button class="btn btn-audio"     onclick="replayQ()">Hear question again</button>
      <button class="btn btn-secondary" onclick="replayStoryQ(${isEx})">Hear their story again</button>
    </div>
    ${isEx?`<div class="ex-explain" id="exExp"></div>`:''}
  </div>`;
  stopSpeak();
  setTimeout(()=>speak(`Question ${qi+1}. ${q.text}`),350);
}

function replayQ() {
  const v=exPhase()?EXAMPLE:VIGNETTES[S.vi];
  const qi=exPhase()?S.eqi:S.qi;
  stopSpeak();
  speak(v.questions[qi].text);
}
function replayStoryQ(isEx) {
  const v=isEx?EXAMPLE:VIGNETTES[S.vi];
  stopSpeak();
  speakSeq(v.parts,null,()=>speak(`Now, thinking about ${v.char1.name} and ${v.char2.name}, what do you think?`));
}

function doAnswer(ans) {
  ['btnY','btnN'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  const isEx=exPhase();
  const v=isEx?EXAMPLE:VIGNETTES[S.vi];
  const qi=isEx?S.eqi:S.qi;
  const q=v.questions[qi];
  flashBtn(ans);
  popFB(ans);
  if (isEx) {
    const exDiv=document.getElementById('exExp');
    if(exDiv){exDiv.style.display='block';exDiv.textContent=q.explain||'';}
    stopSpeak();
    speak(q.explain||'',()=>{
      setTimeout(()=>{
        if(S.eqi<EXAMPLE.questions.length-1){S.eqi++;S.phase='ex-q';render();}
        else{speak("Great job on the practice! Now let us start the real game!",()=>{S.phase='story';S.vi=0;S.qi=0;render();});}
      },2000);
    });
  } else {
    S.answers.push({
      vid:v.id, vM:v.model, qi, qM:q.qM, ans, keyed:q.keyed,
      ok:ans===q.keyed, ts:new Date().toISOString()
    });
    setTimeout(()=>{
      if(S.qi<2){S.qi++;S.phase='q';}
      else{S.stars++;S.phase='trans';}
      render();
    },900);
  }
}

function flashBtn(ans) {
  const b=document.getElementById(ans==='YES'?'btnY':'btnN');
  if(!b)return;
  b.style.transform='scale(1.14)';
  b.style.boxShadow='0 0 0 6px rgba(255,255,255,.7)';
  setTimeout(()=>{b.style.transform='';b.style.boxShadow='';},450);
}

function popFB(ans) {
  const wrap=document.createElement('div');
  wrap.className='fb-wrap';
  wrap.innerHTML=`<div class="fb-emoji">${ans==='YES'?'👍':'👎'}</div>`;
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),900);
}

function renderTrans() {
  const ni=S.vi+1;
  const last=ni>=VIGNETTES.length;
  const np=last?null:VIGNETTES[ni];
  app.innerHTML=`
  <div class="trans-screen">
    <div class="trans-star">Star</div>
    <div class="trans-msg">Great job! ${S.stars} ${S.stars===1?'star':'stars'} so far!</div>
    <div class="trans-next">${last?'That was the last pair!':'Next: meet '+np.char1.name+' and '+np.char2.name+'!'}</div>
  </div>`;
  const msg=last?`Amazing! You finished all the pairs!`:`Great job! You earned a star! Next, let us meet ${np.char1.name} and ${np.char2.name}!`;
  stopSpeak();
  speak(msg,()=>{
    setTimeout(()=>{
      if(last){S.phase='end';}else{S.vi++;S.qi=0;S.phase='story';}
      render();
    },700);
  });
}

function renderEnd() {
  const nm=S.name||'Detective';
  const tot=S.answers.length;
  const cor=S.answers.filter(a=>a.ok).length;
  app.innerHTML=`
  <div class="end-screen">
    <div class="end-trophy">Trophy</div>
    <div class="end-title">Amazing job, ${nm}!</div>
    <div class="end-sub">You answered all ${VIGNETTES.length} pairs! ${S.stars} stars earned!</div>
    <div style="font-size:15px;color:#bbb;margin-top:-4px">${cor} of ${tot} answers matched the scoring key.</div>
    <div class="end-btns">
      <button class="btn btn-primary"   onclick="exportCSV()">Download Results</button>
      <button class="btn btn-secondary" onclick="resetGame()">Play Again</button>
    </div>
  </div>`;
  stopSpeak();
  speak(`Wow, amazing job, ${nm}! You finished the whole game! You are a real Friend Detective! Great work!`);
}

function progHTML(pct,lbl) {
  return `<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-label">${lbl}</div>`;
}

// ── NAVIGATION ───────────────────────────────────────────────
function exPhase()    { return S.phase==='ex-story'||S.phase==='ex-q'; }
function startGame()  { const inp=document.getElementById('cname');S.name=(inp?inp.value:'')||'';S.phase='intro';render(); }
function goExStory()  { S.phase='ex-story';S.eqi=0;render(); }
function goQs(isEx)   { S.phase=isEx?'ex-q':'q';if(isEx)S.eqi=0;else S.qi=0;render(); }
function skipPair()   { if(S.phase==='story'||S.phase==='q'){S.stars++;S.phase='trans';render();} }
function skipEnd()    { stopSpeak();S.phase='end';render(); }
function resetGame()  { stopSpeak();Object.assign(S,{phase:'welcome',name:'',vi:0,qi:0,eqi:0,answers:[],stars:0,adminOpen:false});render(); }

// ── ADMIN ────────────────────────────────────────────────────
document.getElementById('adminBtn').addEventListener('click',()=>{
  S.adminOpen=!S.adminOpen;
  document.getElementById('adminPanel').classList.toggle('open',S.adminOpen);
  updateAdmin();
});
function updateAdmin() {
  const el=document.getElementById('adminLog');
  if(!el)return;
  if(!S.answers.length){el.textContent='No answers yet.';return;}
  el.textContent=S.answers.map(a=>`V${a.vid} Q${a.qi+1} [${a.vM}>${a.qM}]: ${a.ans} (key:${a.keyed}) ${a.ok?'ok':'x'}`).join('\n');
}

// ── CSV EXPORT ───────────────────────────────────────────────
function exportCSV() {
  const rows=['ChildName,VignetteID,VigModel,QIndex,QModel,ChildAnswer,KeyedAnswer,Correct,Timestamp'];
  S.answers.forEach(a=>rows.push(`${S.name},${a.vid},${a.vM},${a.qi+1},${a.qM},${a.ans},${a.keyed},${a.ok},${a.ts}`));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=`RAD15C_${S.name||'child'}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  try {
    initVoices();
    render();
  } catch(err) {
    document.getElementById('app').innerHTML =
      `<div class="error-box">
        <h2 style="color:#e74c3c">Could not start the game</h2>
        <p style="margin:10px 0">Error: <strong>${err.message}</strong></p>
        <pre style="background:#f5f5f5;padding:12px;border-radius:8px;
                    font-size:12px;text-align:left;overflow:auto">${err.stack||''}</pre>
      </div>`;
    console.error(err);
  }
});

window.addEventListener('keydown',e=>{
  if(e.key==='Backspace'&&e.target.tagName!=='INPUT') e.preventDefault();
});

</script>
</body>
</html>
