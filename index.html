* { box-sizing: border-box; margin: 0; padding: 0; }
body {

}
#app {
  width: 100%; max-width: 760px;

  box-shadow: 0 8px 40px rgba(0,0,0,.18);

}
:fullscreen body, :-webkit-full-screen body { padding:0; align-items:stretch; justify-content:stretch; }
:fullscreen #app, :-webkit-full-screen #app { max-width:100%; border-radius:0; min-height:100vh; height:100vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }

#fullscreenBtn {

#adminBtn {

#adminPanel {

<body>

<div id="app">
  <div style="padding:44px;text-align:center;font-family:Arial,sans-serif;color:#aaa">
    <div style="font-size:54px;margin-bottom:14px">🔍</div>
    <h2>Loading Relationship Detective...</h2>
    <p style="margin-top:10px;font-size:14px">If this does not go away, please check that JavaScript is enabled.</p>
  </div>
</div>

<button id="fullscreenBtn" onclick="toggleFullscreen()" title="Go Fullscreen">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
       fill="none" stroke="#4776e6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
</button>
<button id="adminBtn" title="Researcher Panel">⚙️</button>

<script>
'use strict';

// ── FULLSCREEN ─────────────────────────────────────────
const FS_SVG_ENTER = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4776e6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
const FS_SVG_EXIT  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4776e6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`;

function toggleFullscreen() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el).catch(err => console.warn('Fullscreen:', err.message));
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
}

function updateFullscreenBtn() {
  const btn = document.getElementById('fullscreenBtn');
  if (!btn) return;
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  btn.innerHTML = isFs ? FS_SVG_EXIT : FS_SVG_ENTER;
  btn.title     = isFs ? 'Exit Fullscreen' : 'Go Fullscreen';
  const banner = document.getElementById('fsBanner');
  if (banner) banner.style.display = isFs ? 'none' : '';
}
['fullscreenchange','webkitfullscreenchange'].forEach(evt =>
  document.addEventListener(evt, updateFullscreenBtn)
);

// ── SECRET RESEARCHER UNLOCK ───────────────────────────
let secretTaps = 0, secretTimer = null;

function setupSecretZone() {
  const zone = document.getElementById('secretZone');
  if (!zone) return;
  zone.addEventListener('click', () => {
    secretTaps++;
    clearTimeout(secretTimer);
    secretTimer = setTimeout(() => { secretTaps = 0; }, 3000);
    if (secretTaps >= 5) {
      secretTaps = 0;
      clearTimeout(secretTimer);
      revealResearcherControls();
    }
  });
}

function revealResearcherControls() {
  const btn = document.getElementById('adminBtn');
  if (!btn) return;
  btn.classList.add('visible');
  btn.style.background = 'rgba(71,118,230,.85)';
  setTimeout(() => { btn.style.background = ''; }, 700);
  const zone = document.getElementById('secretZone');
  if (zone) zone.style.pointerEvents = 'none';
}

// ── GOOGLE SHEETS UPLOAD ───────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwDD5qinnX2su-gF2VDrWoKJ6YbBWX9GRbqIFDm8Wm_e3ifNA4S9n66qBj6Lrb10yAEog/exec';

function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name) || '';
}
const CHS_RESPONSE_ID = getUrlParam('chsid');

function uploadToSheets(answerObj) {
  const row = {
    CHSResponseID:    CHS_RESPONSE_ID,
    ParticipantID:    S.pid   || '',
    ChildName:        S.name  || '',
    Age:              S.age   || '',
    Type:             answerObj.type             || '',
    VignetteID:       answerObj.vid              || '',
    VignetteModel:    answerObj.vM               || '',
    QuestionIndex:    answerObj.qi != null ? answerObj.qi + 1 : '',
    QuestionModel:    answerObj.qM               || '',
    ItemID:           answerObj.itemId           || '',
    IsCongruent:      answerObj.congruent != null ? String(answerObj.congruent).toUpperCase() : '',
    Answer:           answerObj.ans              || '',
    InitialYesNo:     answerObj.initialAns       || '',
    KeyedAnswer:      answerObj.keyed            || '',
    Correct:          answerObj.ok        != null ? String(answerObj.ok).toUpperCase()        : '',
    ModelIDChosen:    answerObj.chosen           || '',
    ModelIDCorrect:   answerObj.correct   != null ? String(answerObj.correct).toUpperCase()   : '',
    ModelIDCertainty: answerObj.modelCertainty   || '',
    Timestamp:        answerObj.ts               || ''
  };
  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rows: [row] })
  }).catch(err => console.warn('Sheets upload failed:', err));
}

function markSessionComplete() {
  if (window.opener) window.opener.postMessage({ type: 'GAME_COMPLETE', pid: S.pid }, '*');
}

const W = 600, H = 300, GY = H * 0.70;
const IMG_BASE   = 'https://raw.githubusercontent.com/ashleyjthomas/GameRAD/main/';
const AUDIO_BASE = 'https://raw.githubusercontent.com/ashleyjthomas/GameRAD/main/';

// ── AUDIO MAP ─────────────────────────────────────────

function fillNames(text, v) {
  return text.replace(/\{char1\}/g, v.char1.name).replace(/\{char2\}/g, v.char2.name);
}

function assignAllQuestions() {
  const pools = {
    EM: [...TEST_ITEMS.EM].sort(() => Math.random() - 0.5),
    CS: [...TEST_ITEMS.CS].sort(() => Math.random() - 0.5),
    AR: [...TEST_ITEMS.AR].sort(() => Math.random() - 0.5)
  };
  const counters = { EM: 0, CS: 0, AR: 0 };
  function pick(model, excluded) {
    const arr = pools[model]; let attempts = 0;
    while (attempts < arr.length) {
      const item = arr[counters[model] % arr.length]; counters[model]++;
      if (!excluded.includes(item.id)) return item; attempts++;
    }
    return arr.find(item => !excluded.includes(item.id)) || arr[0];
  }
  VIGNETTES.forEach(v => {
    const excluded = v.excludeItems || [];
    const questions = ['EM','CS','AR'].map(m => {
      const item = pick(m, excluded);
      return { id: item.id, text: fillNames(item.text, v), qM: m, png: item.png, keyed: m === v.model ? 'YES' : 'NO', congruent: m === v.model };
    });
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    v.questions = questions;
  });
}

// ── AUDIO PLAYBACK ─────────────────────────────────────
let currentAudio = null;
let audioSeqId   = 0;   // increment to cancel any in-progress sequence
let audioUnlocked = false;

// Play a single pre-recorded file by AUDIO_MAP key.
// done() is only called if the sequence has not been cancelled.
function playAudio(key, done) {
  done = done || function(){};
  const file = AUDIO_MAP[key];
  if (!file) { console.warn('No audio for key:', key); done(); return; }
  const mySeqId = audioSeqId;
  const audio = new Audio(AUDIO_BASE + file);
  currentAudio = audio;
  let finished = false;   // ensure finish only runs once per audio (prevents chained done() from firing multiple times)
  const finish = () => {
    if (finished) return;
    finished = true;
    if (currentAudio === audio) currentAudio = null;
    if (audioSeqId === mySeqId) done();
  };
  audio.onended = finish;
  audio.onerror = finish;
  audio.play().catch(() => finish());
}

function stopAudio() {
  audioSeqId++;   // cancels all ongoing sequences
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
}

function unlockAudio(audioKey) {
  if (audioUnlocked) { if (audioKey) playAudio(audioKey); return; }
  audioUnlocked = true;
  // Use a silent utterance to unlock AudioContext on iOS/Safari
  if (window.speechSynthesis) {
    const silent = new SpeechSynthesisUtterance(' '); silent.volume = 0;
    silent.onend = () => { if (audioKey) playAudio(audioKey); };
    speechSynthesis.speak(silent);
  } else { if (audioKey) playAudio(audioKey); }
  const ub = document.getElementById('unlockBtn'); if (ub) ub.remove();
}

    const imgEl=`<image href="${imgUrl}" x="${cx-imgW/2}" y="${groundY-imgH+imgYOffset}" width="${imgW}" height="${imgH}" preserveAspectRatio="xMidYMax meet"/>`;

  p.push(`<rect x="${cx-lW-2}" y="${lT}" width="${lW}" height="${lH}" rx="6" fill="${pants}"/>`);

  p.push(`<rect x="${cx-bW*.5-aW}" y="${bT+4}" width="${aW}" height="${aH}" rx="5" fill="${shirt}"/>`);
  p.push(`<circle cx="${cx-bW*.5-aW*.5}" cy="${bT+4+aH}" r="7" fill="${sk}"/>`);

    p.push(`<line x1="${cx+hR-1}" y1="${hY-1}" x2="${cx+hR+5}" y2="${hY-3}" stroke="${hair}" stroke-width="5"/>`);
  }
  p.push(`<path d="M${cx-14},${hY-2} Q${cx-8},${hY-12} ${cx-2},${hY-2}" stroke="#333" stroke-width="2.3" fill="none" stroke-linecap="round"/>`);

  p.push(`<path d="M${cx-10},${hY+9} Q${cx},${hY+19} ${cx+10},${hY+9}" stroke="#333" stroke-width="2.3" fill="none" stroke-linecap="round"/>`);
  p.push(`<circle cx="${cx-17}" cy="${hY+6}" r="6" fill="#FFA0A0" opacity=".42"/>`);
  p.push(`<circle cx="${cx+17}" cy="${hY+6}" r="6" fill="#FFA0A0" opacity=".42"/>`);

function starHeaderHTML(earned, total) {
  const lv=getCurrentLevel(earned);
  const items=Array.from({length:total},(_,i)=>`<span class="star-item${i<earned?' filled':''}">\u2605</span>`).join('');
  return `<div class="star-meter-wrap"><div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:2px"><span style="font-size:14px">${lv.emoji}</span><span style="font-size:10px;font-weight:600;color:${lv.color2}">${lv.label}</span></div><div class="star-meter">${items}</div><div class="star-meter-lbl">Pair ${S.vi+1} of ${total}</div></div>`;
}

function starTransHTML(earned, total) {
  const pct=Math.round((earned/total)*100), lv=getCurrentLevel(earned), prev=getCurrentLevel(Math.max(0,earned-1));
  const levelUp=earned>0&&lv.label!==prev.label;
  const items=Array.from({length:total},(_,i)=>{const f=i<earned,n=f&&i===earned-1;return `<span class="star-item${f?' filled':''}${n?' newly-filled':''}">\u2605</span>`;}).join('');
  return `<div style="text-align:center;margin-bottom:6px">${levelUp?`<div class="level-badge"><div style="font-size:44px">${lv.emoji}</div><div style="font-size:18px;font-weight:600;color:${lv.color2};margin-top:2px">⬆ Level Up! ${lv.label}</div></div>`:`<div style="font-size:30px">${lv.emoji}</div><div style="font-size:13px;font-weight:600;color:${lv.color2}">${lv.label}</div>`}</div><div class="star-meter star-meter-large">${items}</div><div class="meter-bar-wrap"><div class="meter-bar" style="width:${pct}%;background:linear-gradient(90deg,${lv.color},${lv.color2})"></div><span class="meter-pct">${earned} / ${total}</span></div>`;
}

const app = document.getElementById('app');

function render() {
  updateAdmin();
  try {
    switch (S.phase) {
      case 'welcome':         renderWelcome();                         break;
      case 'intro':           renderIntro();                           break;
      case 'story':           if (!VIGNETTES[S.vi]) { S.phase='end'; renderEnd(); } else { renderStory(VIGNETTES[S.vi]); } break;
      case 'model-id':        if (!VIGNETTES[S.vi]) { S.phase='end'; renderEnd(); } else { renderModelId(); } break;
      case 'model-certainty': if (!VIGNETTES[S.vi]) { S.phase='end'; renderEnd(); } else { renderModelCertainty(); } break;
      case 'q':               if (!VIGNETTES[S.vi]) { S.phase='end'; renderEnd(); } else { renderQuestion(VIGNETTES[S.vi], S.qi); } break;
      case 'q-likert':        renderLikert();                          break;
      case 'trans':           renderTrans();                           break;
      case 'midpoint':        renderMidpoint();                        break;
      case 'end':             renderEnd();                             break;
    }
  } catch(err) {
    app.innerHTML = `<div class="error-box"><h2 style="color:#e74c3c">Something went wrong</h2><p style="margin:10px 0"><strong>${err.message}</strong></p><pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;text-align:left;overflow:auto">${err.stack||''}</pre><button class="btn btn-primary" style="margin-top:12px" onclick="resetGame()">Start Over</button></div>`;
    console.error(err);
  }
}

function renderStory(v) {

    <div class="story-head"><div class="pair-title">Meet ${escHtml(v.char1.name)} and ${escHtml(v.char2.name)}!</div></div>

    </div>
  </div>`;
  stopAudio();
  const pk = pairKey(v);
  playAudio('meet_' + pk, () => {
    const mySeqId = audioSeqId;
    let si = 0;
    function nextPart() {
      if (audioSeqId !== mySeqId) return;
      if (si >= v.parts.length) {
        document.querySelectorAll('.sent').forEach(el=>el.classList.remove('hi'));
        const rb=document.getElementById('readyBtn'); if(rb) rb.style.display='inline-flex';
        playAudio('ready_' + pk);

      const el=document.getElementById('snt'+si); if(el) el.classList.add('hi');
      const partKey = 'story_' + v.id + 'abc'[si];
      si++;
      playAudio(partKey, nextPart);
    }
    nextPart();
  });
}

  const v=VIGNETTES[S.vi]; stopAudio();

        document.querySelectorAll('.sent').forEach(el=>el.classList.remove('hi'));

  ${starHeaderHTML(S.stars,VIGNETTES.length)}
  <div class="screen" style="padding-top:4px;gap:9px">
    <div class="q-header">Question ${qi+1} of 3 &nbsp;&middot;&nbsp; <strong>${escHtml(v.char1.name)}</strong> &amp; <strong>${escHtml(v.char2.name)}</strong></div>
    <div style="text-align:center;font-size:17px;font-weight:600;color:#333">
      You said <span style="background:${isYes?'linear-gradient(135deg,#56ab2f,#a8e063)':'linear-gradient(135deg,#eb3349,#f45c43)'};color:white;padding:3px 14px;border-radius:20px;font-size:22px;display:inline-block;vertical-align:middle;margin:0 4px">${isYes?'YES 👍':'NO 👎'}</span>
    </div>
    <div style="text-align:center;font-size:15px;color:#555;font-weight:500">How sure are you?</div>
    <div class="q-illust">${qIllustHTML(q)}</div>
    <div class="ans-row" style="gap:16px;align-items:flex-end">
      <button class="btn-likert-strong" id="btnDef" style="${strongStyle}" onclick="doLikertAnswer('DEFINITELY')">
        ${isYes?thumbsUpSVG(54):thumbsDownSVG(54)}
        <span style="margin-top:4px;font-size:15px;font-weight:600">Really sure!<br>${isYes?'👍 YES':'👎 NO'}</span>
      </button>
      <button class="btn-likert-mild" id="btnMay" style="${mildStyle}" onclick="doLikertAnswer('MAYBE')">
        ${isYes?thumbsUpSVG(36):thumbsDownSVG(36)}
        <span style="margin-top:3px;font-size:13px">A little sure<br>${isYes?'👍 YES':'👎 NO'}</span>
      </button>
    </div>
  </div>`;
  stopAudio();
  playAudio(isYes ? 'sure_yes' : 'sure_no');
}

function doLikertAnswer(certainty) {
  ['btnDef','btnMay'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  const btn=document.getElementById(certainty==='DEFINITELY'?'btnDef':'btnMay');
  if(btn){btn.style.transform='scale(1.1)';setTimeout(()=>{if(btn)btn.style.transform='';},300);}
  const v=VIGNETTES[S.vi], q=v.questions[S.qi], initAns=S.pendingAns;
  const fullAns=certainty==='DEFINITELY'?(initAns==='YES'?'DEFINITELY_YES':'DEFINITELY_NO'):(initAns==='YES'?'MAYBE_YES':'MAYBE_NO');
  const rec={type:'test',vid:v.id,vM:v.model,qi:S.qi,qM:q.qM,itemId:q.id,ans:fullAns,initialAns:initAns,keyed:q.keyed,ok:initAns===q.keyed,congruent:q.congruent,ts:new Date().toISOString()};
  S.answers.push(rec); uploadToSheets(rec); S.pendingAns=null; stopAudio();
  setTimeout(()=>{if(S.qi<2){S.qi++;S.phase='q';}else{S.stars++;S.phase='trans';}render();},650);
}

// ── MODEL ID ───────────────────────────────────────────
function renderModelId() {
  const v=VIGNETTES[S.vi], models=S.modelIdOrder;
  app.innerHTML=`
  ${starHeaderHTML(S.stars,VIGNETTES.length)}
  <div class="screen" style="padding-top:4px;gap:10px">
    <div class="q-header">🔍 ${escHtml(v.char1.name)} &amp; ${escHtml(v.char2.name)}</div>
    <div class="q-box"><span>Which of these pictures shows how <strong>${escHtml(v.char1.name)}</strong> and <strong>${escHtml(v.char2.name)}</strong> act with each other?</span></div>
    <div class="ans-row" style="gap:18px;justify-content:center;flex-wrap:wrap">
      ${models.map(m=>`<button class="btn-model-choice" onclick="doModelId('${m}')"><img src="${IMG_BASE}${m}.png" style="width:100px;height:100px;object-fit:contain;display:block;border-radius:8px" alt="${m}"/></button>`).join('')}
    </div>
    <div class="replay-section"><div class="replay-label">Need a reminder?</div><div class="replay-btns"><button class="btn-story-replay" onclick="replayStoryQ()">📖 Hear their story again</button></div></div>
  </div>`;
  stopAudio();
  playAudio('model_' + pairKey(v));
}

function doModelId(chosenModel) {
  document.querySelectorAll('.btn-model-choice').forEach(b=>b.disabled=true);
  S.pendingModelChoice=chosenModel; stopAudio();
  setTimeout(()=>{S.phase='model-certainty';render();},300);
}

// ── MODEL CERTAINTY ────────────────────────────────────
function renderModelCertainty() {
  const v=VIGNETTES[S.vi], chosen=S.pendingModelChoice;
  app.innerHTML=`
  ${starHeaderHTML(S.stars,VIGNETTES.length)}
  <div class="screen" style="padding-top:4px;gap:10px">
    <div class="q-header">🔍 ${escHtml(v.char1.name)} &amp; ${escHtml(v.char2.name)}</div>
    <div style="text-align:center;font-size:17px;font-weight:600;color:#333;margin-top:4px">You picked this picture:</div>
    <div style="display:flex;justify-content:center;margin-top:4px">
      <div style="border-radius:16px;border:3px solid #E0E0E0;padding:10px;background:white">
        <img src="${IMG_BASE}${chosen}.png" style="width:120px;height:120px;object-fit:contain;display:block;border-radius:8px" alt="${chosen}"/>
      </div>
    </div>
    <div style="text-align:center;font-size:15px;color:#555;font-weight:500;margin-top:8px">How sure are you about this choice?</div>
    <div class="ans-row" style="gap:16px;align-items:flex-end;margin-top:6px">
      <button class="btn-likert-strong" id="btnModelDef"
        style="background:linear-gradient(135deg,#1e8449,#27AE60);color:white;box-shadow:0 6px 18px rgba(30,132,73,.4);"
        onclick="doModelCertaintyAnswer('DEFINITELY')">
        ${thumbsUpSVG(54)}
        <span style="margin-top:4px;font-size:15px;font-weight:600">Really sure!<br>👍 This one</span>
      </button>
      <button class="btn-likert-mild" id="btnModelMay"
        style="background:linear-gradient(135deg,#a8e063,#d0f5a0);color:#1a5e2a;box-shadow:0 4px 12px rgba(168,224,99,.35);"
        onclick="doModelCertaintyAnswer('MAYBE')">
        ${thumbsUpSVG(36)}
        <span style="margin-top:3px;font-size:13px">A little sure<br>👍 This one</span>
      </button>
    </div>
  </div>`;
  stopAudio();
  playAudio('you_picked');
}

function doModelCertaintyAnswer(certainty) {
  ['btnModelDef','btnModelMay'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  const btn=document.getElementById(certainty==='DEFINITELY'?'btnModelDef':'btnModelMay');
  if(btn){btn.style.transform='scale(1.1)';setTimeout(()=>{if(btn)btn.style.transform='';},300);}
  const v=VIGNETTES[S.vi], chosen=S.pendingModelChoice;
  const rec={type:'model-id',vid:v.id,vM:v.model,chosen:chosen,correct:chosen===v.model,modelCertainty:certainty,ts:new Date().toISOString()};
  S.answers.push(rec); uploadToSheets(rec);
  S.pendingModelChoice=null; S.qi=0; stopAudio();
  setTimeout(()=>{S.phase='q';render();},400);
}

function flashBtn(ans) {
  const b=document.getElementById(ans==='YES'?'btnY':'btnN'); if(!b) return;
  b.style.transition='transform 0.15s, box-shadow 0.15s';
  b.style.transform='scale(1.14)'; b.style.boxShadow='0 0 0 8px rgba(255,255,255,0.68)';
  setTimeout(()=>{b.style.transform='';b.style.boxShadow='';},320);
}

function doAnswer(ans) {
  ['btnY','btnN'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  stopAudio();
  S.pendingAns=ans; flashBtn(ans);
  setTimeout(()=>{S.phase='q-likert';render();},480);
}

// ── TRANSITION ─────────────────────────────────────────
function renderTrans() {
  const ni=S.vi+1, last=ni>=VIGNETTES.length, isMidpoint=ni===6&&!last, np=last?null:VIGNETTES[ni];
  app.innerHTML=`
  <div class="trans-screen">
    ${starTransHTML(S.stars,VIGNETTES.length)}
    <div class="trans-msg" style="margin-top:8px">Thank you for your help.</div>
    <div style="font-size:19px;font-weight:600;color:#F39C12">${S.stars} star${S.stars===1?'':'s'} collected!</div>
    <div class="trans-sub">${last?'That was the very last pair — you are almost done!':isMidpoint?'You are halfway through — great work!':`Next up: meet <strong>${escHtml(np.char1.name)}</strong> and <strong>${escHtml(np.char2.name)}</strong>!`}</div>
  </div>`;
  stopAudio();
  const starKey = last ? 'trans_last'
    : isMidpoint ? 'trans_halfway'
    : `trans_${S.stars}star${S.stars===1?'':'s'}`;
  playAudio(starKey, () => {
    setTimeout(()=>{
      if(last){S.phase='end';}
      else{S.vi++;S.qi=0;S.phase=S.vi===6?'midpoint':'story';}
      render();
    }, 500);
  });
}

// ── MIDPOINT ───────────────────────────────────────────
function renderMidpoint() {
  const nm=S.name||'Detective';
  app.innerHTML=`
  <div class="midpoint-screen">
    <div style="font-size:58px;animation:bounceIn .85s cubic-bezier(.17,.67,.37,1.3)">🌟</div>
    <div style="font-size:26px;font-weight:600;color:#333">Halfway there, ${escHtml(nm)}!</div>
    <div style="font-size:16px;color:#555;max-width:360px;line-height:1.75;background:#F8F4FF;padding:16px 20px;border-radius:16px;border:3px solid #C9B8F0">
      You have already met <strong>6 pairs</strong> of friends who live far away — that is really helpful.<br><br>
      Would you like to keep going and meet <strong>6 more</strong>?<br>
      Or would you like to <strong>say goodbye for now</strong>?
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:6px">
      <button class="btn btn-primary" style="font-size:18px;padding:14px 30px" onclick="continueGame()">Keep Going! 🚀</button>
      <button class="btn btn-secondary" style="font-size:16px;padding:13px 26px" onclick="exitToCHS()">Bye for now! 👋</button>
    </div>
    <div style="font-size:11px;color:#ccc;margin-top:4px">Your answers so far have been saved.</div>
  </div>`;
  stopAudio();
  playAudio('halfway');
}

function continueGame() { stopAudio(); S.phase='story'; render(); }

function exitToCHS() {
  stopAudio(); markSessionComplete();
  document.querySelectorAll('.midpoint-screen button').forEach(b=>b.disabled=true);
  playAudio('goodbye', () => {
    window.location.href=getUrlParam('return_url')||'https://www.childrenhelpingscience.com';
  });
}

// ── END ────────────────────────────────────────────────
function renderEnd() {
  const nm=S.name||'Detective', testAns=S.answers.filter(a=>a.type==='test'), tot=testAns.length, cor=testAns.filter(a=>a.ok).length;
  app.innerHTML=`
  <div class="end-screen">
    <div class="end-trophy-wrap">${trophySVG()}</div>
    <div class="end-title">Thank you, ${escHtml(nm)}!</div>
    ${starTransHTML(S.stars,VIGNETTES.length)}
    <div class="end-sub" style="margin-top:4px">You answered questions about all ${VIGNETTES.length} pairs of people who live far away.</div>
    <div style="font-size:12px;color:#ccc">${cor} of ${tot} test answers matched the scoring key</div>
    <div class="end-btns">
      <button class="btn btn-primary" onclick="exportCSV()">Download Results</button>
      <button class="btn btn-secondary" onclick="resetGame()">Play Again</button>
    </div>
  </div>`;
  markSessionComplete(); stopAudio();
}

// ── NAVIGATION ─────────────────────────────────────────
function startGame() {
  const inp=document.getElementById('cname'), sel=document.getElementById('cage');
  S.name=(inp?inp.value.trim():'')||''; S.age=(sel?sel.value:'')||'';
  S.pid=getUrlParam('pid')||S.pid||'';
  if(!S.name){ unlockAudio('name_needed'); return; }
  stopAudio();
  audioUnlocked=true;
  for(let i=VIGNETTES.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[VIGNETTES[i],VIGNETTES[j]]=[VIGNETTES[j],VIGNETTES[i]];}
  assignAllQuestions();
  S.phase='intro'; render();
}

function startRealGame() { stopAudio(); S.phase='story'; S.vi=0; S.qi=0; render(); }

function goModelId() {
  stopAudio();
  S.modelIdOrder=['EM','CS','AR'].sort(()=>Math.random()-.5);
  S.phase='model-id'; render();
}

function skipPair() {
  if(['story','model-id','model-certainty','q','q-likert'].includes(S.phase)){
    stopAudio();
    S.pendingAns=null; S.pendingModelChoice=null; S.stars++; S.phase='trans'; render();
  }
}
function skipMidpoint() { stopAudio(); S.vi=6; S.qi=0; S.phase='midpoint'; render(); }
function skipEnd()      { stopAudio(); S.phase='end'; render(); }

function resetGame() {
  stopAudio();
  Object.assign(S,{phase:'welcome',name:'',age:'',pid:'',vi:0,qi:0,pendingAns:null,pendingModelChoice:null,modelIdOrder:[],answers:[],stars:0,adminOpen:false});
  render();
}

// ── ADMIN ──────────────────────────────────────────────
function setupAdmin() {
  const panel=document.getElementById('adminPanel');
  if(!panel) return;
  panel.innerHTML=`
    <h3>Researcher Panel</h3>
    <div class="admin-section-label">Responses</div>
    <div class="admin-log" id="adminLog">No answers yet.</div>
    <button class="admin-btn-sm admin-btn-gold" style="width:100%;margin-bottom:4px;padding:8px;font-size:11px;border-radius:7px" onclick="exportCSV()">Download Results (CSV)</button>
    <button class="admin-btn-sm" style="width:100%;margin-bottom:4px;padding:7px;font-size:11px;border-radius:7px" onclick="skipPair()">Skip this pair</button>
    <button class="admin-btn-sm" style="width:100%;margin-bottom:4px;padding:7px;font-size:11px;border-radius:7px" onclick="skipMidpoint()">Skip to midpoint</button>
    <button class="admin-btn-sm" style="width:100%;padding:7px;font-size:11px;border-radius:7px" onclick="skipEnd()">Skip to End</button>`;
  document.getElementById('adminBtn').addEventListener('click',()=>{
    S.adminOpen=!S.adminOpen;
    panel.classList.toggle('open',S.adminOpen);
    updateAdmin();
  });
  updateAdmin();
}

function updateAdmin() {
  const el=document.getElementById('adminLog'); if(!el) return;
  if(!S.answers.length){el.textContent='No answers yet.';return;}
  el.textContent=S.answers.map(a=>{
    if(a.type==='model-id') return `V${a.vid}[${a.vM}] MODEL-ID: chose ${a.chosen} ${a.correct?'✓':'✗'} (${a.modelCertainty||''})`;
    return `V${a.vid}[${a.vM}] Q${a.qi+1} ${a.itemId}[${a.qM}] ${a.congruent?'CON':'INC'}: ${a.ans} key:${a.keyed} ${a.ok?'✓':'✗'}`;
  }).join('\n');
}

// ── CSV EXPORT ─────────────────────────────────────────
function exportCSV() {
  const headers=['ParticipantID','ChildName','ChildAge','Type','VignetteID','VignetteModel','QuestionIndex','QuestionModel','ItemID','IsCongruent','Answer','InitialYesNo','KeyedAnswer','Correct','ModelIDChosen','ModelIDCorrect','ModelIDCertainty','Timestamp'];
  const rows=[headers.join(',')];
  S.answers.forEach(a=>{
    if(a.type==='model-id'){
      rows.push([S.pid,S.name,S.age,'MODEL_ID',a.vid,a.vM,'','','','','','','','',a.chosen,a.correct?'TRUE':'FALSE',a.modelCertainty||'',a.ts].join(','));
    } else {
      rows.push([S.pid,S.name,S.age,'TEST_ITEM',a.vid,a.vM,a.qi+1,a.qM,a.itemId||'',a.congruent?'TRUE':'FALSE',a.ans,a.initialAns||(a.ans.includes('YES')?'YES':'NO'),a.keyed,a.ok?'TRUE':'FALSE','','','',a.ts].join(','));
    }
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'}), url=URL.createObjectURL(blob), link=document.createElement('a');
  link.href=url; link.download=`RAD12C_${S.pid||S.name||'child'}_age${S.age||'unknown'}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click(); URL.revokeObjectURL(url);
}

// ── INIT ───────────────────────────────────────────────
window.addEventListener('load', () => {
  try {
    setupAdmin();
    setupSecretZone();
    updateFullscreenBtn();
    render();
  } catch(err) {
    document.getElementById('app').innerHTML=`<div class="error-box"><h2 style="color:#e74c3c">Could not start the game</h2><p style="margin:10px 0"><strong>${err.message}</strong></p><pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;text-align:left;overflow:auto">${err.stack||''}</pre></div>`;
    console.error(err);
  }
});

window.addEventListener('keydown', e => {
  if(e.key==='Backspace'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='SELECT') e.preventDefault();
  if(e.shiftKey && e.ctrlKey && e.key==='R') revealResearcherControls();
});
</script>
