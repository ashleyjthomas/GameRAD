<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Relationship Detective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Fredoka', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
  background: linear-gradient(160deg, #a8edea, #fed6e3);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
#app {
  width: 100%; max-width: 760px;
  background: #FFFEF7; border-radius: 22px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
  min-height: 580px;
}
:fullscreen body, :-webkit-full-screen body { padding:0; align-items:stretch; justify-content:stretch; }
:fullscreen #app, :-webkit-full-screen #app { max-width:100%; border-radius:0; min-height:100vh; height:100vh; }

/* ── OVERLAY ELEMENTS — fixed to viewport, never wiped by render() ── */
#fullscreenBtn {
  position: fixed; top: 10px; right: 10px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(71,118,230,.18); border: 2px solid rgba(71,118,230,.35);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 9999; transition: background .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
#fullscreenBtn:hover  { background: rgba(71,118,230,.35); }
#fullscreenBtn:active { transform: scale(.92); }

#adminBtn {
  position: fixed; bottom: 10px; right: 10px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,.15); border: none; cursor: pointer;
  font-size: 15px; display: none;
  align-items: center; justify-content: center; z-index: 9999;
}
#adminBtn.visible { display: flex; }

#adminPanel {
  position: fixed; bottom: 54px; right: 10px;
  background: white; border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  padding: 14px; width: 295px; z-index: 9998;
  font-size: 13px; display: none;
  font-family: 'Fredoka', sans-serif;
}
#adminPanel.open { display: block; }
#adminPanel h3 { font-size:14px; margin-bottom:8px; color:#333; border-bottom:1px solid #eee; padding-bottom:5px; }

#secretZone {
  position: fixed; bottom: 0; right: 0;
  width: 70px; height: 70px; z-index: 10000;
  -webkit-tap-highlight-color: transparent;
}

/* ── FULLSCREEN BANNER ── */
.fs-banner {
  background: linear-gradient(135deg, #4776e6, #8e54e9); color: white;
  text-align: center; padding: 10px 16px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
}
.fs-banner-btn {
  background: white; color: #4776e6; border: none; border-radius: 50px;
  font-family: inherit; font-size: 13px; font-weight: 600; padding: 6px 14px; cursor: pointer;
}
.fs-banner-dismiss {
  background: transparent; color: rgba(255,255,255,.7); border: none;
  font-size: 18px; cursor: pointer; padding: 0 4px;
}

/* ── ADMIN INTERNALS ── */
.admin-section-label { font-weight:600; font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.admin-log { max-height:120px; overflow-y:auto; font-size:10px; font-family:monospace; background:#f8f8f8; border-radius:6px; padding:6px; margin-bottom:7px; white-space:pre; line-height:1.5; }
.admin-input, .admin-select { width:100%; padding:5px 7px; font-size:11px; border:1px solid #ddd; border-radius:6px; margin-bottom:5px; outline:none; background:white; font-family:inherit; }
.admin-row { display:flex; gap:5px; margin-bottom:5px; }
.admin-btn-sm { flex:1; padding:6px 4px; font-size:11px; font-family:inherit; border-radius:6px; cursor:pointer; border:1px solid #ddd; background:#F0EDE8; color:#555; }
.admin-btn-blue { background:#4776e6; color:white; border-color:#4776e6; }
.admin-btn-gold { background:linear-gradient(135deg,#f7971e,#ffd200); color:white; border:none; font-weight:600; }

/* ── STARS / METER ── */
.star-meter-wrap { display:flex; flex-direction:column; align-items:center; padding:8px 16px 3px; gap:2px; }
.star-meter { display:flex; gap:2px; justify-content:center; flex-wrap:nowrap; align-items:center; }
.star-item { font-size:17px; color:#E0E0E0; line-height:1; display:inline-block; transition:color 0.3s; }
.star-item.filled { color:#FFD700; text-shadow:0 0 5px rgba(255,180,0,.65); }
.star-item.newly-filled { animation:starPop 0.8s cubic-bezier(0.17,0.67,0.37,1.5) forwards; }
@keyframes starPop { 0%{transform:scale(0.1) rotate(-190deg);} 65%{transform:scale(1.5) rotate(8deg);} 100%{transform:scale(1) rotate(0deg);} }
.star-meter-lbl { font-size:10px; color:#ccc; }
.star-meter-large { flex-wrap:wrap; max-width:220px; gap:6px; }
.star-meter-large .star-item { font-size:34px; }
.meter-bar-wrap { width:220px; height:20px; background:#E8E8E8; border-radius:10px; overflow:hidden; position:relative; margin:8px auto 0; }
.meter-bar { height:100%; border-radius:10px; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
.meter-pct { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; font-size:10px; color:#555; font-weight:600; }
.level-badge { text-align:center; animation:bounceIn .85s cubic-bezier(.17,.67,.37,1.3); }

/* ── LAYOUT ── */
.screen { flex:1; display:flex; flex-direction:column; align-items:center; padding:11px 17px 17px; animation:fadeIn .35s ease; gap:9px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.wt { font-size:36px; font-weight:600; text-align:center; line-height:1.2; background:linear-gradient(135deg,#f7971e,#f64f59); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.ws { font-size:16px; color:#888; text-align:center; }
.form-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; width:100%; }
.form-group { text-align:center; }
.form-group label { display:block; font-size:14px; color:#666; margin-bottom:5px; }
.name-input, .age-select { font-family:inherit; font-size:18px; padding:9px 14px; border:3px solid #FFD200; border-radius:50px; outline:none; text-align:center; color:#333; background:#FFFEF7; }
.name-input { width:180px; } .age-select { width:140px; cursor:pointer; }
.name-input:focus, .age-select:focus { border-color:#F7971E; box-shadow:0 0 0 4px rgba(247,151,30,.13); }

/* ── BUTTONS ── */
.btn { font-family:inherit; font-size:17px; font-weight:600; border:none; border-radius:50px; padding:11px 24px; cursor:pointer; transition:transform .1s,box-shadow .1s; display:inline-flex; align-items:center; gap:6px; box-shadow:0 4px 12px rgba(0,0,0,.14); -webkit-tap-highlight-color:transparent; }
.btn:active { transform:scale(.95); } .btn:disabled { opacity:.44; cursor:not-allowed; }
.btn-primary { background:linear-gradient(135deg,#f7971e,#ffd200); color:white; }
.btn-secondary { background:#F0EDE8; color:#555; font-size:14px; padding:8px 17px; }
.btn-audio { background:linear-gradient(135deg,#4776e6,#8e54e9); color:white; font-size:14px; padding:8px 16px; }
.btn-story-replay { background:linear-gradient(135deg,#2196F3,#21CBF3); color:white; font-size:14px; padding:8px 16px; border:none; border-radius:50px; cursor:pointer; font-family:inherit; font-weight:600; box-shadow:0 3px 10px rgba(0,0,0,.12); -webkit-tap-highlight-color:transparent; }
.btn-story-replay:active { transform:scale(.95); }
.btn-green { background:linear-gradient(135deg,#56ab2f,#a8e063); color:white; font-size:22px; padding:14px 18px; box-shadow:0 6px 20px rgba(86,171,47,.38); flex:1; max-width:165px; justify-content:center; flex-direction:column; gap:5px; border-radius:20px; }
.btn-red { background:linear-gradient(135deg,#eb3349,#f45c43); color:white; font-size:22px; padding:14px 18px; box-shadow:0 6px 20px rgba(235,51,73,.38); flex:1; max-width:165px; justify-content:center; flex-direction:column; gap:5px; border-radius:20px; }
.ans-thumb { display:block; margin:0 auto; object-fit:contain; }
.btn-likert-strong { font-family:inherit; font-size:15px; font-weight:600; border:none; border-radius:20px; padding:12px 10px; cursor:pointer; transition:transform .1s,box-shadow .1s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:5px; flex:1; max-width:170px; box-shadow:0 6px 18px rgba(0,0,0,.18); -webkit-tap-highlight-color:transparent; }
.btn-likert-mild { font-family:inherit; font-size:14px; font-weight:600; border:none; border-radius:20px; padding:10px 8px; cursor:pointer; transition:transform .1s,box-shadow .1s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px; flex:1; max-width:145px; box-shadow:0 4px 12px rgba(0,0,0,.12); -webkit-tap-highlight-color:transparent; }
.btn-likert-strong:active, .btn-likert-mild:active { transform:scale(.95); }
.btn-likert-strong:disabled, .btn-likert-mild:disabled { opacity:.44; cursor:not-allowed; }
.btn-model-choice { background:white; border:3px solid #E0E0E0; border-radius:16px; padding:10px; cursor:pointer; transition:transform .1s,border-color .1s,box-shadow .1s; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; }
.btn-model-choice:active { transform:scale(.95); }
.btn-model-choice:hover { border-color:#4776e6; box-shadow:0 4px 16px rgba(71,118,230,.25); }
.btn-model-choice:disabled { opacity:.5; cursor:not-allowed; }

/* ── STORY / QUESTION ── */
.illus { width:100%; border-radius:13px; overflow:hidden; background:#E8F4FF; box-shadow:inset 0 2px 8px rgba(0,0,0,.07); }
.q-illust { width:100%; max-width:360px; align-self:center; border-radius:12px; overflow:hidden; border:2px solid #F0EDE8; background:#FAFAFA; }
.story-head { display:flex; justify-content:space-between; align-items:center; width:100%; }
.pair-title { font-size:18px; font-weight:600; color:#333; }
.story-box { width:100%; background:white; border-radius:12px; padding:11px 15px; font-size:16px; line-height:1.72; color:#333; border:2px solid #F0EDE8; }
.sent { display:inline; border-radius:4px; padding:1px 2px; transition:background .3s; }
.sent.hi { background:#FFF3B0; }
.story-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; }
.q-header { width:100%; background:linear-gradient(135deg,#4776e6,#8e54e9); border-radius:11px; padding:8px 14px; color:white; font-size:14px; display:flex; align-items:center; gap:6px; }
.q-box { width:100%; background:#F8F4FF; border-radius:13px; padding:12px 16px; font-size:16px; line-height:1.6; color:#333; border:3px solid #C9B8F0; text-align:center; min-height:66px; display:flex; align-items:center; justify-content:center; }
.ans-row { display:flex; gap:15px; justify-content:center; width:100%; }
.replay-section { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }
.replay-label { font-size:11px; color:#bbb; text-align:center; }
.replay-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }

/* ── SCREENS ── */
.trans-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:22px; text-align:center; }
.trans-msg { font-size:22px; font-weight:600; color:#333; }
.trans-sub { font-size:15px; color:#aaa; }
.midpoint-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:28px; text-align:center; animation:fadeIn .35s ease; }
.end-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; gap:10px; }
.end-trophy-wrap { animation:bounceIn .85s cubic-bezier(.17,.67,.37,1.3); }
@keyframes bounceIn { 0%{transform:scale(0);} 65%{transform:scale(1.18);} 82%{transform:scale(.94);} 100%{transform:scale(1);} }
.end-title { font-size:29px; font-weight:600; color:#f7971e; }
.end-sub { font-size:16px; color:#666; }
.end-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.info-box { font-size:15px; color:#555; line-height:1.82; max-width:500px; background:#F8F4FF; padding:14px 18px; border-radius:14px; border:3px solid #C9B8F0; }
.error-box { padding:28px; font-family:Arial,sans-serif; max-width:600px; margin:auto; text-align:center; }
.unlock-btn { background:linear-gradient(135deg,#4776e6,#8e54e9); color:white; border:none; border-radius:50px; font-family:inherit; font-size:17px; font-weight:600; padding:13px 28px; cursor:pointer; box-shadow:0 4px 18px rgba(71,118,230,.45); animation:pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

@media (max-width:480px) {
  .wt { font-size:25px; }
  .btn-green,.btn-red { font-size:18px; max-width:138px; }
  .q-box { font-size:14px; }
  .story-box { font-size:14px; }
  .trans-msg { font-size:18px; }
  .star-meter-large .star-item { font-size:26px; }
}
</style>
</head>
<body>

<div id="app">
  <div style="padding:44px;text-align:center;font-family:Arial,sans-serif;color:#aaa">
    <div style="font-size:54px;margin-bottom:14px">🔍</div>
    <h2>Loading Relationship Detective...</h2>
    <p style="margin-top:10px;font-size:14px">If this does not go away, please check that JavaScript is enabled.</p>
  </div>
</div>

<!-- ── OVERLAY ELEMENTS: outside #app so render() never destroys them ── -->
<button id="fullscreenBtn" onclick="toggleFullscreen()" title="Go Fullscreen">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
       fill="none" stroke="#4776e6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
</button>
<button id="adminBtn" title="Researcher Panel">⚙️</button>
<div id="adminPanel"></div>
<div id="secretZone"></div>

<script>
'use strict';

// ── FULLSCREEN ─────────────────────────────────────────
const FS_SVG_ENTER = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4776e6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
const FS_SVG_EXIT  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4776e6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`;

function toggleFullscreen() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el).catch(err => console.warn('Fullscreen:', err.message));
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
}

function updateFullscreenBtn() {
  const btn = document.getElementById('fullscreenBtn');
  if (!btn) return;
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  btn.innerHTML = isFs ? FS_SVG_EXIT : FS_SVG_ENTER;
  btn.title     = isFs ? 'Exit Fullscreen' : 'Go Fullscreen';
  const banner = document.getElementById('fsBanner');
  if (banner) banner.style.display = isFs ? 'none' : '';
}
['fullscreenchange','webkitfullscreenchange'].forEach(evt =>
  document.addEventListener(evt, updateFullscreenBtn)
);

// ── SECRET RESEARCHER UNLOCK (5 taps bottom-right within 3s) ──
let secretTaps = 0, secretTimer = null;

function setupSecretZone() {
  const zone = document.getElementById('secretZone');
  if (!zone) return;
  zone.addEventListener('click', () => {
    secretTaps++;
    clearTimeout(secretTimer);
    secretTimer = setTimeout(() => { secretTaps = 0; }, 3000);
    if (secretTaps >= 5) {
      secretTaps = 0;
      clearTimeout(secretTimer);
      revealResearcherControls();
    }
  });
}

function revealResearcherControls() {
  const btn = document.getElementById('adminBtn');
  if (!btn) return;
  btn.classList.add('visible');
  btn.style.background = 'rgba(71,118,230,.85)';
  setTimeout(() => { btn.style.background = ''; }, 700);
}

// ── GOOGLE SHEETS UPLOAD ───────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwDD5qinnX2su-gF2VDrWoKJ6YbBWX9GRbqIFDm8Wm_e3ifNA4S9n66qBj6Lrb10yAEog/exec';

function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name) || '';
}
const CHS_RESPONSE_ID = getUrlParam('chsid');

function uploadToSheets(answerObj) {
  const row = {
    CHSResponseID:    CHS_RESPONSE_ID,
    ParticipantID:    S.pid   || '',
    ChildName:        S.name  || '',
    Age:              S.age   || '',
    Type:             answerObj.type             || '',
    VignetteID:       answerObj.vid              || '',
    VignetteModel:    answerObj.vM               || '',
    QuestionIndex:    answerObj.qi != null ? answerObj.qi + 1 : '',
    QuestionModel:    answerObj.qM               || '',
    ItemID:           answerObj.itemId           || '',
    IsCongruent:      answerObj.congruent != null ? String(answerObj.congruent).toUpperCase() : '',
    Answer:           answerObj.ans              || '',
    InitialYesNo:     answerObj.initialAns       || '',
    KeyedAnswer:      answerObj.keyed            || '',
    Correct:          answerObj.ok        != null ? String(answerObj.ok).toUpperCase()        : '',
    ModelIDChosen:    answerObj.chosen           || '',
    ModelIDCorrect:   answerObj.correct   != null ? String(answerObj.correct).toUpperCase()   : '',
    ModelIDCertainty: answerObj.modelCertainty   || '',
    Timestamp:        answerObj.ts               || ''
  };
  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rows: [row] })
  }).catch(err => console.warn('Sheets upload failed:', err));
}

function markSessionComplete() {
  if (window.opener) window.opener.postMessage({ type: 'GAME_COMPLETE', pid: S.pid }, '*');
}

const W = 600, H = 300, GY = H * 0.70;
const IMG_BASE = 'https://raw.githubusercontent.com/ashleyjthomas/GameRAD/main/';

// ── DETECTIVE LEVELS ───────────────────────────────────
const DETECTIVE_LEVELS = [
  { min:  0, label: 'Rookie Detective',  emoji: '🔍', color: '#7EDBFF', color2: '#4A90D9' },
  { min:  3, label: 'Detective Cadet',   emoji: '🕵️', color: '#6BCB77', color2: '#27AE60' },
  { min:  6, label: 'Senior Detective',  emoji: '⭐', color: '#FFD166', color2: '#F39C12' },
  { min:  9, label: 'Super Detective',   emoji: '💫', color: '#FF8FAB', color2: '#E91E8C' },
  { min: 12, label: 'Master Detective!', emoji: '🏆', color: '#FFD700', color2: '#F39C12' }
];
function getCurrentLevel(stars) {
  let lv = DETECTIVE_LEVELS[0];
  for (const l of DETECTIVE_LEVELS) { if (stars >= l.min) lv = l; }
  return lv;
}

// ── TEST ITEMS ─────────────────────────────────────────
const TEST_ITEMS = {
  EM: [
    { id: 'EM1', text: '{char1} and {char2} take turns using the star-viewer to make sure they each get the same amount of time.',                                                             png: 'EMstarviewer.png'     },
    { id: 'EM2', text: 'When their group worked together to build something, {char1} and {char2} each put in the exact same number of moon-rocks.',                                            png: 'EMmoonrocktower.png'  },
    { id: 'EM3', text: '{char1} and {char2} both carefully keep track of how many times they have borrowed each other\'s things, to make sure it stays even between them.',                    png: 'EMevenborrowing.png'  },
    { id: 'EM4', text: 'When {char1} and {char2} share things, they make sure each of them has exactly the same amount before anyone takes any.',                                              png: 'EMequalfruit2.png'    },
    { id: 'EM5', text: '{char1} and {char2} take turns choosing what to do each day, so they each get the same number of choices.',                                                           png: 'EMtaketurnschoice.png'},
    { id: 'EM6', text: 'When {char1} gave {char2} a glurp, {char2} made sure to give {char1} a glurp of the same size back.',                                                                png: 'EMgift.png'           },
    { id: 'EM7', text: '{char1} and {char2} keep track of who has used more things so they can balance it out later.',                                                                        png: 'EMtallycave.png'      },
    { id: 'EM8', text: 'When {char1} and {char2} need to make a choice, they each get one vote — and neither one gets more say than the other.',                                              png: 'EMvoting.png'         }
  ],
  CS: [
    { id: 'CS1', text: 'When {char1} and {char2} share food, they eat from the same big bowl without counting who has more.',                                                                 png: 'CSsamebowl.png'       },
    { id: 'CS2', text: 'When either {char1} or {char2} wins a prize, both feel happy and proud — as though they both won together.',                                                         png: 'CSsproud.png'         },
    { id: 'CS3', text: 'When either {char1} or {char2} finds something nice, they bring it straight to the other to share — not because they have to, just because they share everything.',   png: 'CScrystalshare.png'   },

function fillNames(text, v) {
  return text.replace(/\{char1\}/g, v.char1.name).replace(/\{char2\}/g, v.char2.name);
}

function assignAllQuestions() {
  const pools = {
    EM: [...TEST_ITEMS.EM].sort(() => Math.random() - 0.5),
    CS: [...TEST_ITEMS.CS].sort(() => Math.random() - 0.5),
    AR: [...TEST_ITEMS.AR].sort(() => Math.random() - 0.5)
  };
  const counters = { EM: 0, CS: 0, AR: 0 };
  function pick(model, excluded) {
    const arr = pools[model]; let attempts = 0;
    while (attempts < arr.length) {
      const item = arr[counters[model] % arr.length]; counters[model]++;
      if (!excluded.includes(item.id)) return item; attempts++;
    }
    return arr.find(item => !excluded.includes(item.id)) || arr[0];
  }
  VIGNETTES.forEach(v => {
    const excluded = v.excludeItems || [];
    const questions = ['EM','CS','AR'].map(m => {
      const item = pick(m, excluded);
      return { id: item.id, text: fillNames(item.text, v), qM: m, png: item.png, keyed: m === v.model ? 'YES' : 'NO', congruent: m === v.model };
    });
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    v.questions = questions;
  });
}

// ── SPEECH ─────────────────────────────────────────────
let voices = [], currentAudio = null, seqGen = 0, audioUnlocked = false;

function initVoices() {
  function load() { const v = speechSynthesis.getVoices(); if (v.length) voices = v; }
  load(); speechSynthesis.onvoiceschanged = load;
}

function unlockAudio(thenSpeak) {
  if (audioUnlocked) { if (thenSpeak) speak(thenSpeak); return; }
  audioUnlocked = true;
  if (window.speechSynthesis) {
    const silent = new SpeechSynthesisUtterance(' '); silent.volume = 0;
    silent.onend = () => { if (thenSpeak) speak(thenSpeak); };
    speechSynthesis.speak(silent);
  } else { if (thenSpeak) speak(thenSpeak); }
  const ub = document.getElementById('unlockBtn'); if (ub) ub.remove();
}

function bestVoice() {
  const prefs = ['Google UK English Female','Samantha','Karen','Moira','Google US English','Microsoft Zira Desktop - English (United States)','Microsoft Zira - English (United States)'];
  for (const p of prefs) { const v = voices.find(v => v.name === p || v.name.includes(p)); if (v) return v; }
  return voices.find(v => v.lang && v.lang.startsWith('en') && v.localService) ||
         voices.find(v => v.lang && v.lang.startsWith('en')) || voices[0] || null;
}

function speak(text, done) {
  done = done || function(){};
  if (!text || !text.trim()) { done(); return; }
  if (S.elevenLabsKey && S.elevenLabsKey.trim()) { speakElevenLabs(text, done); }
  else { speakWebSpeech(text, done); }
}

function speakWebSpeech(text, done) {
  done = done || function(){};
  if (!window.speechSynthesis) { done(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = bestVoice(); u.rate = 1.06; u.pitch = 1.08; u.volume = 1;
  u.onend = () => done(); u.onerror = () => done();
  speechSynthesis.speak(u);
}

function speakElevenLabs(text, done) {
  done = done || function(){};
  const voiceId = S.elevenLabsVoice || 'MF3mGyEYCl7XYWbV9V6O';
  fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: 'POST',
    headers: { 'Accept':'audio/mpeg','Content-Type':'application/json','xi-api-key':S.elevenLabsKey },
    body: JSON.stringify({ text, model_id:'eleven_turbo_v2', voice_settings:{ stability:0.42, similarity_boost:0.75, style:0.38, use_speaker_boost:true, speed:1.25 } })
  })
  .then(r => { if (!r.ok) throw new Error('ElevenLabs ' + r.status); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url); currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; done(); };
    audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; speakWebSpeech(text, done); };
    audio.play().catch(() => speakWebSpeech(text, done));
  })
  .catch(err => { console.warn('ElevenLabs error:', err.message); speakWebSpeech(text, done); });
}

function speakSeq(parts, highlightCb, done) {
  const id = ++seqGen; let i = 0;
  function next() {
    if (seqGen !== id) return;
    if (i >= parts.length) { done(); return; }
    if (highlightCb) highlightCb(i);
    speak(parts[i], () => { i++; next(); });
  }
  next();
}

function stopSpeak() {
  seqGen++;
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function svgInner(str) { return str.replace(/<svg[^>]*>/i,'').replace(/<\/svg>\s*$/i,''); }

function sceneSVG(v) {

function starHeaderHTML(earned, total) {
  const lv=getCurrentLevel(earned);
  const items=Array.from({length:total},(_,i)=>`<span class="star-item${i<earned?' filled':''}">\u2605</span>`).join('');
  return `<div class="star-meter-wrap"><div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:2px"><span style="font-size:14px">${lv.emoji}</span><span style="font-size:10px;font-weight:600;color:${lv.color2}">${lv.label}</span></div><div class="star-meter">${items}</div><div class="star-meter-lbl">Pair ${S.vi+1} of ${total}</div></div>`;
}

function starTransHTML(earned, total) {
  const pct=Math.round((earned/total)*100), lv=getCurrentLevel(earned), prev=getCurrentLevel(Math.max(0,earned-1));
  const levelUp=earned>0&&lv.label!==prev.label;
  const items=Array.from({length:total},(_,i)=>{const f=i<earned,n=f&&i===earned-1;return `<span class="star-item${f?' filled':''}${n?' newly-filled':''}">\u2605</span>`;}).join('');
  return `<div style="text-align:center;margin-bottom:6px">${levelUp?`<div class="level-badge"><div style="font-size:44px">${lv.emoji}</div><div style="font-size:18px;font-weight:600;color:${lv.color2};margin-top:2px">⬆ Level Up! ${lv.label}</div></div>`:`<div style="font-size:30px">${lv.emoji}</div><div style="font-size:13px;font-weight:600;color:${lv.color2}">${lv.label}</div>`}</div><div class="star-meter star-meter-large">${items}</div><div class="meter-bar-wrap"><div class="meter-bar" style="width:${pct}%;background:linear-gradient(90deg,${lv.color},${lv.color2})"></div><span class="meter-pct">${earned} / ${total}</span></div>`;
}

function doLikertAnswer(certainty) {
  ['btnDef','btnMay'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  const btn=document.getElementById(certainty==='DEFINITELY'?'btnDef':'btnMay');
  if(btn){btn.style.transform='scale(1.1)';setTimeout(()=>{if(btn)btn.style.transform='';},300);}
  const v=VIGNETTES[S.vi], q=v.questions[S.qi], initAns=S.pendingAns;
  const fullAns=certainty==='DEFINITELY'?(initAns==='YES'?'DEFINITELY_YES':'DEFINITELY_NO'):(initAns==='YES'?'MAYBE_YES':'MAYBE_NO');
  const rec={type:'test',vid:v.id,vM:v.model,qi:S.qi,qM:q.qM,itemId:q.id,ans:fullAns,initialAns:initAns,keyed:q.keyed,ok:initAns===q.keyed,congruent:q.congruent,ts:new Date().toISOString()};
  S.answers.push(rec); uploadToSheets(rec); S.pendingAns=null; stopSpeak();
  setTimeout(()=>{if(S.qi<2){S.qi++;S.phase='q';}else{S.stars++;S.phase='trans';}render();},650);
}

function flashBtn(ans) {
  const b=document.getElementById(ans==='YES'?'btnY':'btnN'); if(!b) return;
  b.style.transition='transform 0.15s, box-shadow 0.15s';
  b.style.transform='scale(1.14)'; b.style.boxShadow='0 0 0 8px rgba(255,255,255,0.68)';
  setTimeout(()=>{b.style.transform='';b.style.boxShadow='';},320);
}

function doAnswer(ans) {
  ['btnY','btnN'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  S.pendingAns=ans; flashBtn(ans);
  setTimeout(()=>{S.phase='q-likert';render();},480);
}

function replayQ() {
  stopSpeak();
  const v=VIGNETTES[S.vi], qi=S.qi;
  speak(`Here is the question again. ${v.questions[qi].text}. Do you think ${v.char1.name} and ${v.char2.name} would act that way?`);
}

function replayStoryQ() {
  const v=VIGNETTES[S.vi]; stopSpeak();
  speak(`Sure! Let me remind you about ${v.char1.name} and ${v.char2.name}.`,()=>{speakSeq(v.parts,null,()=>speak(`Okay. Now, what do you think?`));});
}

function renderTrans() {
  const ni=S.vi+1, last=ni>=VIGNETTES.length, isMidpoint=ni===6&&!last, np=last?null:VIGNETTES[ni];
  app.innerHTML=`
  <div class="trans-screen">
    ${starTransHTML(S.stars,VIGNETTES.length)}
    <div class="trans-msg" style="margin-top:8px">Thank you for your help.</div>
    <div style="font-size:19px;font-weight:600;color:#F39C12">${S.stars} star${S.stars===1?'':'s'} collected!</div>
    <div class="trans-sub">${last?'That was the very last pair — you are almost done!':isMidpoint?'You are halfway through — great work!':`Next up: meet <strong>${escHtml(np.char1.name)}</strong> and <strong>${escHtml(np.char2.name)}</strong>!`}</div>
  </div>`;
  const msg=last?`Thank you for your help. You just finished all twelve pairs and collected ${S.stars} star${S.stars===1?'':'s'}.`
    :isMidpoint?`Thank you for your help. You have finished six pairs and collected ${S.stars} star${S.stars===1?'':'s'}.`
    :`Thank you for your help. You now have ${S.stars} star${S.stars===1?'':'s'}. Next, we will meet ${np.char1.name} and ${np.char2.name}.`;
  stopSpeak();
  speak(msg,()=>{setTimeout(()=>{if(last){S.phase='end';}else{S.vi++;S.qi=0;S.phase=S.vi===6?'midpoint':'story';}render();},750);});
}

function renderMidpoint() {
  const nm=S.name||'Detective';
  app.innerHTML=`
  <div class="midpoint-screen">
    <div style="font-size:58px;animation:bounceIn .85s cubic-bezier(.17,.67,.37,1.3)">🌟</div>
    <div style="font-size:26px;font-weight:600;color:#333">Halfway there, ${escHtml(nm)}!</div>
    <div style="font-size:16px;color:#555;max-width:360px;line-height:1.75;background:#F8F4FF;padding:16px 20px;border-radius:16px;border:3px solid #C9B8F0">
      You have already met <strong>6 pairs</strong> of friends who live far away — that is really helpful.<br><br>
      Would you like to keep going and meet <strong>6 more</strong>?<br>
      Or would you like to <strong>say goodbye for now</strong>?
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:6px">
      <button class="btn btn-primary" style="font-size:18px;padding:14px 30px" onclick="continueGame()">Keep Going! 🚀</button>
      <button class="btn btn-secondary" style="font-size:16px;padding:13px 26px" onclick="exitToCHS()">Bye for now! 👋</button>
    </div>
    <div style="font-size:11px;color:#ccc;margin-top:4px">Your answers so far have been saved.</div>
  </div>`;
  stopSpeak();
  speak(`Wow, ${nm}. You have already met six pairs of friends who live far away. Thank you for your help. Would you like to keep going and meet six more, or say goodbye for now? Press Keep Going to continue, or Bye for now if you are all done today.`);
}

function continueGame() { stopSpeak(); S.phase='story'; render(); }

function exitToCHS() {
  stopSpeak(); markSessionComplete();
  const nm=S.name||'Detective';
  document.querySelectorAll('.midpoint-screen button').forEach(b=>b.disabled=true);
  speak(`Goodbye, ${nm}. Thank you for helping today.`,()=>{
    window.location.href=getUrlParam('return_url')||'https://www.childrenhelpingscience.com';
  });
}

function renderEnd() {
  const nm=S.name||'Detective', testAns=S.answers.filter(a=>a.type==='test'), tot=testAns.length, cor=testAns.filter(a=>a.ok).length;
  app.innerHTML=`
  <div class="end-screen">
    <div class="end-trophy-wrap">${trophySVG()}</div>
    <div class="end-title">Thank you, ${escHtml(nm)}!</div>
    ${starTransHTML(S.stars,VIGNETTES.length)}
    <div class="end-sub" style="margin-top:4px">You answered questions about all ${VIGNETTES.length} pairs of people who live far away.</div>
    <div style="font-size:12px;color:#ccc">${cor} of ${tot} test answers matched the scoring key</div>
    <div class="end-btns">
      <button class="btn btn-primary" onclick="exportCSV()">Download Results</button>
      <button class="btn btn-secondary" onclick="resetGame()">Play Again</button>
    </div>
  </div>`;
  markSessionComplete(); stopSpeak();
  speak(`${nm}, thank you so much for your help today. You answered questions about all twelve pairs of people who live far away, and you thought carefully about each one. You are a wonderful Relationship Detective.`);
}

// ── NAVIGATION ─────────────────────────────────────────
function startGame() {
  const inp=document.getElementById('cname'), sel=document.getElementById('cage');
  S.name=(inp?inp.value.trim():'')||''; S.age=(sel?sel.value:'')||'';
  S.pid=getUrlParam('pid')||S.pid||'';
  if(!S.name){unlockAudio('Oops! Can you type your first name first?');return;}
  audioUnlocked=true;
  for(let i=VIGNETTES.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[VIGNETTES[i],VIGNETTES[j]]=[VIGNETTES[j],VIGNETTES[i]];}
  assignAllQuestions();
  S.phase='intro'; render();
}

function startRealGame() { stopSpeak(); S.phase='story'; S.vi=0; S.qi=0; render(); }

function goModelId() {
  S.modelIdOrder=['EM','CS','AR'].sort(()=>Math.random()-.5);
  S.phase='model-id'; render();
}

function skipPair() {
  if(['story','model-id','model-certainty','q','q-likert'].includes(S.phase)){
    S.pendingAns=null; S.pendingModelChoice=null; S.stars++; S.phase='trans'; render();
  }
}
function skipMidpoint() { stopSpeak(); S.vi=6; S.qi=0; S.phase='midpoint'; render(); }
function skipEnd()      { stopSpeak(); S.phase='end'; render(); }

function resetGame() {
  stopSpeak();
  Object.assign(S,{phase:'welcome',name:'',age:'',pid:'',vi:0,qi:0,pendingAns:null,pendingModelChoice:null,modelIdOrder:[],answers:[],stars:0,adminOpen:false,elevenLabsKey:localStorage.getItem('rad_elKey')||'',elevenLabsVoice:localStorage.getItem('rad_elVoice')||'MF3mGyEYCl7XYWbV9V6O'});
  render();
}

// ── ADMIN ──────────────────────────────────────────────
function setupAdmin() {
  const panel=document.getElementById('adminPanel');
  if(!panel) return;
  panel.innerHTML=`
    <h3>Researcher Panel</h3>
    <div style="margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid #eee">
      <div class="admin-section-label">Voice</div>
      <div style="font-size:10.5px;color:#bbb;margin-bottom:6px;line-height:1.55">For the most natural voice, enter a free <a href="https://elevenlabs.io" target="_blank" style="color:#4776e6">ElevenLabs</a> API key.</div>
      <input id="elKeyInput" type="password" class="admin-input" placeholder="ElevenLabs API key..."/>
      <select id="elVoiceSelect" class="admin-select">
        <option value="MF3mGyEYCl7XYWbV9V6O">Elli — warm, young (recommended)</option>
        <option value="jBpfuIE2acCO8z3wKNLl">Gigi — upbeat, enthusiastic</option>
        <option value="21m00Tcm4TlvDq8ikWAM">Rachel — calm, clear</option>
        <option value="ThT5KcBeYPX3keUQqHPh">Dorothy — warm, pleasant</option>
        <option value="pNInz6obpgDQGcFmaJgB">Adam — friendly, clear</option>
      </select>
      <div class="admin-row">
        <button class="admin-btn-sm" onclick="saveVoiceSettings()">Save</button>
        <button class="admin-btn-sm admin-btn-blue" onclick="testVoice()">Test Voice</button>
      </div>
      <div id="voiceStatus" style="font-size:10.5px;color:#aaa;text-align:center;min-height:14px"></div>
    </div>
    <div class="admin-section-label">Responses</div>
    <div class="admin-log" id="adminLog">No answers yet.</div>
    <button class="admin-btn-sm admin-btn-gold" style="width:100%;margin-bottom:4px;padding:8px;font-size:11px;border-radius:7px" onclick="exportCSV()">Download Results (CSV)</button>
    <button class="admin-btn-sm" style="width:100%;margin-bottom:4px;padding:7px;font-size:11px;border-radius:7px" onclick="skipPair()">Skip this pair</button>
    <button class="admin-btn-sm" style="width:100%;margin-bottom:4px;padding:7px;font-size:11px;border-radius:7px" onclick="skipMidpoint()">Skip to midpoint</button>
    <button class="admin-btn-sm" style="width:100%;padding:7px;font-size:11px;border-radius:7px" onclick="skipEnd()">Skip to End</button>`;
  const ki=document.getElementById('elKeyInput'), vs=document.getElementById('elVoiceSelect');
  if(ki) ki.value=S.elevenLabsKey;
  if(vs) vs.value=S.elevenLabsVoice;
  document.getElementById('adminBtn').addEventListener('click',()=>{
    S.adminOpen=!S.adminOpen;
    panel.classList.toggle('open',S.adminOpen);
    updateAdmin();
  });
  updateAdmin();
}

function saveVoiceSettings() {
  const ki=document.getElementById('elKeyInput'), vs=document.getElementById('elVoiceSelect'), st=document.getElementById('voiceStatus');
  S.elevenLabsKey=ki?ki.value.trim():''; S.elevenLabsVoice=vs?vs.value:'MF3mGyEYCl7XYWbV9V6O';
  try{localStorage.setItem('rad_elKey',S.elevenLabsKey);localStorage.setItem('rad_elVoice',S.elevenLabsVoice);}catch(e){}
  if(st){st.textContent=S.elevenLabsKey?'Saved! ElevenLabs active.':'Saved. Using built-in voice.';setTimeout(()=>{st.textContent='';},2500);}
}

function testVoice() { saveVoiceSettings(); stopSpeak(); speak('Hello! I am the Relationship Detective voice. Does this sound good to you?'); }

function updateAdmin() {
  const el=document.getElementById('adminLog'); if(!el) return;
  if(!S.answers.length){el.textContent='No answers yet.';return;}
  el.textContent=S.answers.map(a=>{
    if(a.type==='model-id') return `V${a.vid}[${a.vM}] MODEL-ID: chose ${a.chosen} ${a.correct?'✓':'✗'} (${a.modelCertainty||''})`;
    return `V${a.vid}[${a.vM}] Q${a.qi+1} ${a.itemId}[${a.qM}] ${a.congruent?'CON':'INC'}: ${a.ans} key:${a.keyed} ${a.ok?'✓':'✗'}`;
  }).join('\n');
}

// ── CSV EXPORT ─────────────────────────────────────────
function exportCSV() {
  const headers=['ParticipantID','ChildName','ChildAge','Type','VignetteID','VignetteModel','QuestionIndex','QuestionModel','ItemID','IsCongruent','Answer','InitialYesNo','KeyedAnswer','Correct','ModelIDChosen','ModelIDCorrect','ModelIDCertainty','Timestamp'];
  const rows=[headers.join(',')];
  S.answers.forEach(a=>{
    if(a.type==='model-id'){
      rows.push([S.pid,S.name,S.age,'MODEL_ID',a.vid,a.vM,'','','','','','','','',a.chosen,a.correct?'TRUE':'FALSE',a.modelCertainty||'',a.ts].join(','));
    } else {
      rows.push([S.pid,S.name,S.age,'TEST_ITEM',a.vid,a.vM,a.qi+1,a.qM,a.itemId||'',a.congruent?'TRUE':'FALSE',a.ans,a.initialAns||(a.ans.includes('YES')?'YES':'NO'),a.keyed,a.ok?'TRUE':'FALSE','','','',a.ts].join(','));
    }
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'}), url=URL.createObjectURL(blob), link=document.createElement('a');
  link.href=url; link.download=`RAD12C_${S.pid||S.name||'child'}_age${S.age||'unknown'}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click(); URL.revokeObjectURL(url);
}

// ── INIT ───────────────────────────────────────────────
window.addEventListener('load', () => {
  try {
    initVoices();
    setupAdmin();       // builds panel content + click listener (panel is outside #app, persists)
    setupSecretZone();  // sets up tap listener (secretZone is outside #app, persists)
    updateFullscreenBtn();
    render();
  } catch(err) {
    document.getElementById('app').innerHTML=`<div class="error-box"><h2 style="color:#e74c3c">Could not start the game</h2><p style="margin:10px 0"><strong>${err.message}</strong></p><pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;text-align:left;overflow:auto">${err.stack||''}</pre></div>`;
    console.error(err);
  }
});

window.addEventListener('keydown', e => {
  if(e.key==='Backspace'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='SELECT') e.preventDefault();
});
</script>
