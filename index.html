<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Friend Detective</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', Arial, sans-serif;
  background: linear-gradient(160deg, #a8edea, #fed6e3);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

#app {
  width: 100%;
  max-width: 760px;
  background: #FFFEF7;
  border-radius: 22px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 580px;
}

.prog-wrap {
  background: #F0EDE8; height: 13px; border-radius: 7px;
  margin: 12px 18px 0; overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 7px; transition: width .55s ease;
}
.prog-label { text-align: center; font-size: 12px; color: #aaa; margin: 3px 0 0; }

.screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 14px 18px 20px;
  animation: fadeIn .35s ease; gap: 10px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0);   }
}

/* Welcome */
.wt {
  font-size: 38px; font-weight: bold; text-align: center; line-height: 1.2;
  background: linear-gradient(135deg, #f7971e, #f64f59);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ws { font-size: 17px; color: #888; text-align: center; }

/* Name input */
.name-wrap { text-align: center; }
.name-wrap label { display: block; font-size: 17px; color: #666; margin-bottom: 6px; }
.name-input {
  font-family: inherit; font-size: 20px; padding: 10px 18px;
  border: 3px solid #FFD200; border-radius: 50px; outline: none;
  width: 215px; text-align: center; color: #333; background: #FFFEF7;
}
.name-input:focus { border-color: #F7971E; box-shadow: 0 0 0 4px rgba(247,151,30,.15); }

/* Buttons */
.btn {
  font-family: inherit; font-size: 18px; font-weight: bold;
  border: none; border-radius: 50px; padding: 12px 28px;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
  display: inline-flex; align-items: center; gap: 7px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
  -webkit-tap-highlight-color: transparent;
}
.btn:active  { transform: scale(.95); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary   { background: linear-gradient(135deg,#f7971e,#ffd200); color: white; }
.btn-secondary { background: #F0EDE8; color: #555; font-size: 15px; padding: 9px 20px; }
.btn-audio     { background: linear-gradient(135deg,#4776e6,#8e54e9); color: white; font-size: 16px; padding: 10px 22px; }

/* Answer buttons — column layout with face + label */
.btn-green {
  background: linear-gradient(135deg,#56ab2f,#a8e063); color: white;
  font-size: 22px; padding: 12px 20px;
  box-shadow: 0 6px 20px rgba(86,171,47,.4);
  flex: 1; max-width: 170px;
  justify-content: center; flex-direction: column; gap: 5px; border-radius: 20px;
}
.btn-red {
  background: linear-gradient(135deg,#eb3349,#f45c43); color: white;
  font-size: 22px; padding: 12px 20px;
  box-shadow: 0 6px 20px rgba(235,51,73,.4);
  flex: 1; max-width: 170px;
  justify-content: center; flex-direction: column; gap: 5px; border-radius: 20px;
}

/* Face animations on answer buttons */
.ans-face { display: block; width: 54px; height: 54px; margin: 0 auto; }
.btn-green .ans-face { animation: faceBounce 1.1s ease-in-out infinite; }
.btn-red   .ans-face { animation: faceWiggle 1.7s ease-in-out infinite; }

@keyframes faceBounce {
  0%,100% { transform: translateY(0)    scale(1);    }
  45%     { transform: translateY(-8px) scale(1.09); }
}
@keyframes faceWiggle {
  0%,100% { transform: rotate(0deg);   }
  20%     { transform: rotate(-10deg); }
  60%     { transform: rotate(10deg);  }
  80%     { transform: rotate(-5deg);  }
}

/* Illustration */
.illus {
  width: 100%; border-radius: 14px; overflow: hidden;
  background: #E8F4FF; box-shadow: inset 0 2px 8px rgba(0,0,0,.07);
}
.illus svg { display: block; width: 100%; height: auto; }

/* Story */
.story-head { display: flex; justify-content: space-between; align-items: center; width: 100%; }
.pair-title { font-size: 19px; font-weight: bold; color: #333; }
.audio-status { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #bbb; }
.audio-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #ddd; transition: background .3s; flex-shrink: 0;
}
.audio-dot.on { background: #4CAF50; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.4);} }
.story-box {
  width: 100%; background: white; border-radius: 12px;
  padding: 13px 17px; font-size: 17px; line-height: 1.75;
  color: #333; border: 2px solid #F0EDE8;
}
.sent { display: inline; border-radius: 4px; padding: 1px 2px; transition: background .3s; }
.sent.hi { background: #FFF3B0; }
.story-btns { display: flex; gap: 9px; flex-wrap: wrap; justify-content: center; width: 100%; }

/* Question DV frame */
.q-frame {
  width: 100%; background: rgba(71,118,230,0.08); border-radius: 11px;
  padding: 9px 14px; font-size: 16px; color: #444; text-align: center;
  line-height: 1.55; border: 1.5px solid rgba(71,118,230,0.22);
}
.q-frame strong { color: #4776e6; }
.q-frame .they { color: #e74c3c; text-decoration: underline; font-weight: bold; }

/* Question */
.q-header {
  width: 100%; background: linear-gradient(135deg,#4776e6,#8e54e9);
  border-radius: 11px; padding: 9px 15px; color: white;
  font-size: 15px; display: flex; align-items: center; gap: 7px;
}
.q-box {
  width: 100%; background: #F8F4FF; border-radius: 14px;
  padding: 14px 18px; font-size: 18px; line-height: 1.65;
  color: #333; border: 3px solid #C9B8F0;
  text-align: center; min-height: 78px;
  display: flex; align-items: center; justify-content: center;
}
.ans-row { display: flex; gap: 18px; justify-content: center; width: 100%; }
.q-replay { display: flex; gap: 9px; flex-wrap: wrap; justify-content: center; width: 100%; }

/* Example explain */
.ex-explain {
  display: none; width: 100%; background: #E8F8E8;
  border: 2px solid #A5D6A7; border-radius: 12px;
  padding: 13px 17px; font-size: 16px; color: #2E7D32;
  text-align: center; line-height: 1.6;
}

/* Feedback pop */
.fb-wrap {
  position: fixed; inset: 0; display: flex;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 999;
}
.fb-emoji { font-size: 100px; animation: popIn .85s ease forwards; opacity: 0; }
@keyframes popIn {
  0%   { transform: scale(.1);  opacity: 0; }
  45%  { transform: scale(1.3); opacity: 1; }
  75%  { transform: scale(1.0); opacity: 1; }
  100% { transform: scale(.6);  opacity: 0; }
}

/* Transition */
.trans-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 28px; text-align: center;
}
.trans-star-wrap { animation: starIn .75s cubic-bezier(.17,.67,.37,1.3); }
@keyframes starIn {
  0%   { transform: scale(0) rotate(-200deg); opacity: 0; }
  70%  { transform: scale(1.15) rotate(10deg); opacity: 1; }
  100% { transform: scale(1)   rotate(0);     opacity: 1; }
}
.trans-msg  { font-size: 23px; font-weight: bold; color: #333; }
.trans-sub  { font-size: 17px; color: #aaa; }

/* End */
.end-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px; text-align: center; gap: 11px;
}
.end-trophy-wrap { animation: bounceIn .85s cubic-bezier(.17,.67,.37,1.3); }
@keyframes bounceIn {
  0%   { transform: scale(0);    }
  65%  { transform: scale(1.18); }
  82%  { transform: scale(.94);  }
  100% { transform: scale(1);    }
}
.end-title { font-size: 31px; font-weight: bold; color: #f7971e; }
.end-sub   { font-size: 18px; color: #666; }
.end-btns  { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

/* Admin */
.admin-btn {
  position: fixed; bottom: 10px; right: 10px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,.13); border: none; cursor: pointer;
  font-size: 15px; display: flex; align-items: center;
  justify-content: center; z-index: 500;
}
.admin-panel {
  position: fixed; bottom: 54px; right: 10px;
  background: white; border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  padding: 14px; width: 295px; z-index: 500;
  font-size: 13px; display: none;
}
.admin-panel.open { display: block; }
.admin-panel h3 {
  font-size: 14px; margin-bottom: 9px; color: #333;
  border-bottom: 1px solid #eee; padding-bottom: 6px;
}
.admin-section-label {
  font-weight: bold; font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 5px;
}
.admin-log {
  max-height: 140px; overflow-y: auto; font-size: 11px;
  font-family: monospace; background: #f8f8f8;
  border-radius: 6px; padding: 7px; margin-bottom: 8px;
  white-space: pre; line-height: 1.5;
}
.admin-input {
  width: 100%; padding: 6px 8px; font-size: 11px;
  border: 1px solid #ddd; border-radius: 6px;
  margin-bottom: 5px; outline: none; font-family: monospace;
}
.admin-select {
  width: 100%; padding: 6px 8px; font-size: 11px;
  border: 1px solid #ddd; border-radius: 6px;
  margin-bottom: 6px; background: white; outline: none;
}
.admin-row { display: flex; gap: 6px; margin-bottom: 6px; }
.admin-btn-sm {
  flex: 1; padding: 7px 4px; font-size: 11px;
  font-family: inherit; border-radius: 6px;
  cursor: pointer; border: 1px solid #ddd;
  background: #F0EDE8; color: #555;
}
.admin-btn-blue {
  background: #4776e6; color: white; border-color: #4776e6;
}
.admin-btn-gold {
  background: linear-gradient(135deg,#f7971e,#ffd200);
  color: white; border: none; font-weight: bold;
}

/* Info box */
.info-box {
  font-size: 16px; color: #555; line-height: 1.85;
  max-width: 510px; background: #F8F4FF;
  padding: 16px 20px; border-radius: 14px; border: 3px solid #C9B8F0;
}

/* Error */
.error-box { padding: 30px; font-family: Arial,sans-serif; max-width: 600px; margin: auto; text-align: center; }

@media (max-width: 480px) {
  .wt { font-size: 27px; }
  .btn-green, .btn-red { font-size: 18px; max-width: 145px; }
  .q-box { font-size: 16px; }
  .story-box { font-size: 15px; }
  .trans-msg { font-size: 19px; }
}

</style>
</head>

// ── SPEECH ────────────────────────────────────────────────────
let voices = [];
let currentAudio = null;
let seqGen = 0;

function initVoices() {
  voices = speechSynthesis.getVoices();
  if (!voices.length)
    speechSynthesis.addEventListener('voiceschanged', () => { voices = speechSynthesis.getVoices(); });
}

function bestVoice() {
  const prefs = [
    'Google UK English Female', 'Samantha', 'Karen', 'Moira',
    'Google US English',
    'Microsoft Zira Desktop - English (United States)',
    'Microsoft Zira - English (United States)'
  ];
  for (const p of prefs) {
    const v = voices.find(v => v.name === p || v.name.includes(p));
    if (v) return v;
  }
  return voices.find(v => v.lang && v.lang.startsWith('en') && v.localService) ||
         voices.find(v => v.lang && v.lang.startsWith('en')) ||
         voices[0] || null;
}

function speak(text, done) {
  done = done || function(){};
  if (!text || !text.trim()) { done(); return; }
  if (S.elevenLabsKey && S.elevenLabsKey.trim()) {
    speakElevenLabs(text, done);
  } else {
    speakWebSpeech(text, done);
  }
}

function speakWebSpeech(text, done) {
  done = done || function(){};
  if (!window.speechSynthesis) { done(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice  = bestVoice();
  u.rate   = 0.85;
  u.pitch  = 1.08;
  u.volume = 1;
  u.onend  = () => { setDot(false); done(); };
  u.onerror= () => { setDot(false); done(); };
  setDot(true);
  speechSynthesis.speak(u);
}

function speakElevenLabs(text, done) {
  done = done || function(){};
  const voiceId = S.elevenLabsVoice || 'MF3mGyEYCl7XYWbV9V6O';
  setDot(true);
  fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: 'POST',
    headers: {
      'Accept': 'audio/mpeg',
      'Content-Type': 'application/json',
      'xi-api-key': S.elevenLabsKey
    },
    body: JSON.stringify({
      text: text,
      model_id: 'eleven_turbo_v2',
      voice_settings: { stability: 0.45, similarity_boost: 0.75, style: 0.35, use_speaker_boost: true }
    })
  })
  .then(r => { if (!r.ok) throw new Error('ElevenLabs ' + r.status); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { setDot(false); URL.revokeObjectURL(url); currentAudio = null; done(); };
    audio.onerror = () => { setDot(false); URL.revokeObjectURL(url); currentAudio = null; speakWebSpeech(text, done); };
    audio.play().catch(() => { setDot(false); speakWebSpeech(text, done); });
  })
  .catch(err => {
    console.warn('ElevenLabs error, using built-in voice:', err.message);
    setDot(false);
    speakWebSpeech(text, done);
  });
}

function speakSeq(parts, highlightCb, done) {
  const id = ++seqGen;
  let i = 0;
  function next() {
    if (seqGen !== id) return;
    if (i >= parts.length) { done(); return; }
    if (highlightCb) highlightCb(i);
    speak(parts[i], () => { i++; next(); });
  }
  next();
}

function stopSpeak() {
  seqGen++;
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  setDot(false);
}

function setDot(on) {
  const d = document.querySelector('.audio-dot');
  if (d) d.classList.toggle('on', on);
  const l = document.getElementById('audioLabel');
  if (l) l.textContent = on ? 'Listening...' : 'Done';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const SKINS = ['#FDBCB4','#F0C090','#E0A878','#C87E50','#FDDBB4'];
function skin(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xFFFF;
  return SKINS[h % SKINS.length];
}

// ── RENDER ────────────────────────────────────────────────────
const app = document.getElementById('app');

function render() {
  updateAdmin();
  try {
    switch (S.phase) {
      case 'welcome':  renderWelcome();                               break;
      case 'intro':    renderIntro();                                 break;
      case 'ex-story': renderStory(EXAMPLE, true);                   break;
      case 'ex-q':     renderQuestion(EXAMPLE, S.eqi, true);         break;
      case 'story':    renderStory(VIGNETTES[S.vi], false);          break;
      case 'q':        renderQuestion(VIGNETTES[S.vi], S.qi, false); break;
      case 'trans':    renderTrans();                                 break;
      case 'end':      renderEnd();                                   break;
    }
  } catch(err) {
    app.innerHTML = `<div class="error-box">
      <h2 style="color:#e74c3c">Something went wrong</h2>
      <p style="margin:10px 0"><strong>${err.message}</strong></p>
      <pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:12px;text-align:left;overflow:auto">${err.stack||''}</pre>
      <button class="btn btn-primary" style="margin-top:14px" onclick="resetGame()">Start Over</button>
    </div>`;
    console.error(err);
  }
}

function renderStory(v, isEx) {
  const pct = isEx ? 0 : S.vi / VIGNETTES.length * 100;
  const lbl = isEx ? 'Practice Example' : `Pair ${S.vi + 1} of ${VIGNETTES.length}`;
  app.innerHTML = `
  ${isEx ? '' : progHTML(pct, lbl)}
  <div class="screen" style="padding-top:${isEx ? 14 : 6}px">
    <div class="story-head">
      <div class="pair-title">Meet ${escHtml(v.char1.name)} and ${escHtml(v.char2.name)}!</div>
      <div class="audio-status">
        <div class="audio-dot"></div>
        <span id="audioLabel">Listening...</span>
      </div>
    </div>
    <div class="illus">${sceneSVG(v)}</div>
    <div class="story-box" id="storyBox">
      ${v.parts.map((s, i) => `<span class="sent" id="snt${i}">${escHtml(s)} </span>`).join('')}
    </div>
    <div class="story-btns">
      <button class="btn btn-audio" onclick="replayStory()">
        Hear the story again
      </button>
      <button class="btn btn-primary" id="readyBtn" style="display:none"
              onclick="goQs(${isEx})">
        I am ready for questions!
      </button>
    </div>
    ${isEx ? `<div style="font-size:12px;color:#ccc;margin-top:2px">Just a practice example!</div>` : ''}
  </div>`;
  stopSpeak();
  setTimeout(() => {
    const opener = isEx
      ? `Okay! For our practice, I want you to meet ${v.char1.name} and ${v.char2.name}. Listen carefully while I tell you how they act toward each other!`
      : `Alright! Now I want you to meet ${v.char1.name} and ${v.char2.name}. Listen carefully while I tell you how they act toward each other!`;
    speak(opener, () => {
      speakSeq(
        v.parts,
        i => {
          document.querySelectorAll('.sent').forEach(el => el.classList.remove('hi'));
          const el = document.getElementById(`snt${i}`);
          if (el) el.classList.add('hi');
        },
        () => {
          document.querySelectorAll('.sent').forEach(el => el.classList.remove('hi'));
          const rb = document.getElementById('readyBtn');
          if (rb) rb.style.display = 'inline-flex';
          speak(`Great listening! Now I am going to ask you some questions about ${v.char1.name} and ${v.char2.name}. Think about what you just heard, and press YES or NO for each one. Press the button whenever you are ready!`);
        }
      );
    });
  }, 400);
}

function replayStory() {
  const v = exPhase() ? EXAMPLE : VIGNETTES[S.vi];
  stopSpeak();
  const rb = document.getElementById('readyBtn');
  if (rb) rb.style.display = 'none';
  speak(`Sure! Let me tell you about ${v.char1.name} and ${v.char2.name} again. Listen carefully!`, () => {
    speakSeq(
      v.parts,
      i => {
        document.querySelectorAll('.sent').forEach(el => el.classList.remove('hi'));
        const el = document.getElementById(`snt${i}`);
        if (el) el.classList.add('hi');
      },
      () => {
        document.querySelectorAll('.sent').forEach(el => el.classList.remove('hi'));
        const rb2 = document.getElementById('readyBtn');
        if (rb2) rb2.style.display = 'inline-flex';
      }
    );
  });
}

function renderQuestion(v, qi, isEx) {
  const q   = v.questions[qi];
  const pct = isEx ? 0 : S.vi / VIGNETTES.length * 100;
  const lbl = isEx ? 'Practice Example' : `Pair ${S.vi + 1} of ${VIGNETTES.length}`;
  app.innerHTML = `
  ${isEx ? '' : progHTML(pct, lbl)}
  <div class="screen" style="padding-top:${isEx ? 12 : 6}px;gap:9px">
    <div class="q-header">
      Question ${qi + 1} of 3 &nbsp;&middot;&nbsp;
      <strong>${escHtml(v.char1.name)}</strong> &amp; <strong>${escHtml(v.char2.name)}</strong>
    </div>
    <div class="audio-status" style="justify-content:center">
      <div class="audio-dot"></div>
      <span id="audioLabel">Listen...</span>
    </div>
    <div class="q-frame">
      Thinking about <strong>${escHtml(v.char1.name)}</strong> and <strong>${escHtml(v.char2.name)}</strong>
      and how they act toward each other...<br>
      <strong>do you think <span class="they">they</span> would act this way?</strong>
    </div>
    <div class="q-box">"${escHtml(q.text)}"</div>
    <div class="ans-row">
      <button class="btn btn-green" id="btnY" onclick="doAnswer('YES')">
        ${yesFaceSVG()} YES!
      </button>
      <button class="btn btn-red" id="btnN" onclick="doAnswer('NO')">
        ${noFaceSVG()} NO
      </button>
    </div>
    <div class="q-replay">
      <button class="btn btn-audio"     onclick="replayQ()">Hear question again</button>
      <button class="btn btn-secondary" onclick="replayStoryQ(${isEx})">Hear their story again</button>
    </div>
    ${isEx ? `<div class="ex-explain" id="exExp"></div>` : ''}
  </div>`;
  stopSpeak();
  setTimeout(() =>
    speak(`Question ${qi + 1} of 3. ${q.text}. Do you think ${v.char1.name} and ${v.char2.name} would act that way? Press YES or NO!`),
  350);
}

function replayQ() {
  const v  = exPhase() ? EXAMPLE : VIGNETTES[S.vi];
  const qi = exPhase() ? S.eqi   : S.qi;
  const q  = v.questions[qi];
  stopSpeak();
  speak(`Here is the question again. ${q.text}. Do you think ${v.char1.name} and ${v.char2.name} would act that way?`);
}

function replayStoryQ(isEx) {
  const v = isEx ? EXAMPLE : VIGNETTES[S.vi];
  stopSpeak();
  speak(`Sure! Let me remind you about ${v.char1.name} and ${v.char2.name}.`, () => {
    speakSeq(v.parts, null, () =>
      speak(`Okay! Now, thinking about how ${v.char1.name} and ${v.char2.name} act toward each other — what do you think?`)
    );
  });
}

function doAnswer(ans) {
  ['btnY','btnN'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = true; });
  const isEx = exPhase();
  const v    = isEx ? EXAMPLE : VIGNETTES[S.vi];
  const qi   = isEx ? S.eqi   : S.qi;
  const q    = v.questions[qi];
  flashBtn(ans);
  popFB(ans);

  if (isEx) {
    const exDiv = document.getElementById('exExp');
    if (exDiv) { exDiv.style.display = 'block'; exDiv.textContent = q.explain || ''; }
    stopSpeak();
    const opener = ['Hmm, interesting choice! Let me explain.', 'Nice thinking! Here is what I was thinking.', 'Good guess! Here is the reason.'][qi];
    speak(`${opener} ${q.explain || ''}`, () => {
      setTimeout(() => {
        if (S.eqi < EXAMPLE.questions.length - 1) {
          S.eqi++;
          S.phase = 'ex-q';
          render();
        } else {
          speak(`Great job on the practice! You are already thinking like a real detective! Now let us play the real game. Are you ready?`, () => {
            setTimeout(() => { S.phase = 'story'; S.vi = 0; S.qi = 0; render(); }, 500);
          });
        }
      }, 2200);
    });
  } else {
    S.answers.push({
      vid: v.id, vM: v.model, qi, qM: q.qM, ans,
      keyed: q.keyed, ok: ans === q.keyed, ts: new Date().toISOString()
    });
    setTimeout(() => {
      if (S.qi < 2) { S.qi++;   S.phase = 'q';     }
      else          { S.stars++; S.phase = 'trans'; }
      render();
    }, 950);
  }
}

function flashBtn(ans) {
  const b = document.getElementById(ans === 'YES' ? 'btnY' : 'btnN');
  if (!b) return;
  b.style.transform  = 'scale(1.13)';
  b.style.boxShadow  = '0 0 0 8px rgba(255,255,255,.72)';
  setTimeout(() => { b.style.transform = ''; b.style.boxShadow = ''; }, 450);
}

function popFB(ans) {
  const wrap = document.createElement('div');
  wrap.className = 'fb-wrap';
  wrap.innerHTML = `<div class="fb-emoji">${ans === 'YES' ? '👍' : '👎'}</div>`;
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 920);
}

function renderTrans() {
  const ni   = S.vi + 1;
  const last = ni >= VIGNETTES.length;
  const np   = last ? null : VIGNETTES[ni];
  const kudo = KUDOS[Math.floor(Math.random() * KUDOS.length)];

  app.innerHTML = `
  <div class="trans-screen">
    <div class="trans-star-wrap">${starSVG()}</div>
    <div class="trans-msg">${kudo}</div>
    <div style="font-size:26px;font-weight:bold;color:#F39C12;margin-top:2px">
      ${S.stars} ${S.stars === 1 ? 'star' : 'stars'}!
    </div>
    <div class="trans-sub" style="margin-top:6px">
      ${last
        ? 'That was the very last pair — you are almost finished!'
        : `Next up: meet <strong>${escHtml(np.char1.name)}</strong> and <strong>${escHtml(np.char2.name)}</strong>!`
      }
    </div>
  </div>`;

  const msg = last
    ? `${kudo} You have answered every single pair! You are almost done! What an amazing job!`
    : `${kudo} You have earned a star! You have ${S.stars} ${S.stars === 1 ? 'star' : 'stars'} now! Next up, let us meet ${np.char1.name} and ${np.char2.name}!`;

  stopSpeak();
  speak(msg, () => {
    setTimeout(() => {
      if (last) { S.phase = 'end'; }
      else      { S.vi++; S.qi = 0; S.phase = 'story'; }
      render();
    }, 700);
  });
}

function renderEnd() {
  const nm  = S.name || 'Detective';
  const tot = S.answers.length;
  const cor = S.answers.filter(a => a.ok).length;
  app.innerHTML = `
  <div class="end-screen">
    <div class="end-trophy-wrap">${trophySVG()}</div>
    <div class="end-title">Amazing, ${escHtml(nm)}!</div>
    <div class="end-sub">
      You answered all ${VIGNETTES.length} pairs of friends!<br>
      ${S.stars} star${S.stars === 1 ? '' : 's'} earned!
    </div>
    <div style="font-size:13px;color:#ccc">${cor} of ${tot} answers matched the scoring key</div>
    <div class="end-btns">
      <button class="btn btn-primary"   onclick="exportCSV()">Download Results</button>
      <button class="btn btn-secondary" onclick="resetGame()">Play Again</button>
    </div>
  </div>`;
  stopSpeak();
  speak(`${nm}, you have done something really amazing today! You answered questions about all fifteen pairs of friends! You thought so carefully about each one, and I am incredibly proud of you. You are a true Friend Detective. Give yourself a big pat on the back — you have really earned it!`);
}

function progHTML(pct, lbl) {
  return `<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-label">${lbl}</div>`;
}

// ── NAVIGATION ───────────────────────────────────────────────
function exPhase()  { return S.phase === 'ex-story' || S.phase === 'ex-q'; }

function startGame() {
  const inp = document.getElementById('cname');
  S.name = (inp ? inp.value.trim() : '') || '';
  S.phase = 'intro';
  render();
}
function goExStory() { S.eqi = 0; S.phase = 'ex-story'; render(); }
function goQs(isEx) {
  if (isEx) { S.eqi = 0; S.phase = 'ex-q'; }
  else      { S.qi  = 0; S.phase = 'q';    }
  render();
}
function skipPair() {
  if (S.phase === 'story' || S.phase === 'q') { S.stars++; S.phase = 'trans'; render(); }
}
function skipEnd()   { stopSpeak(); S.phase = 'end'; render(); }
function resetGame() {
  stopSpeak();
  Object.assign(S, { phase:'welcome', name:'', vi:0, qi:0, eqi:0,
                      answers:[], stars:0, adminOpen:false });
  render();
}

// ── ADMIN PANEL ──────────────────────────────────────────────
function setupAdmin() {
  const panel = document.getElementById('adminPanel');
  if (!panel) return;
  panel.innerHTML = `
    <h3>Researcher Panel</h3>

    <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #eee">
      <div class="admin-section-label">Voice settings</div>
      <div style="font-size:11px;color:#bbb;margin-bottom:7px;line-height:1.6">
        For the most natural-sounding voice, enter an ElevenLabs API key.
        Get one free at <a href="https://elevenlabs.io" target="_blank"
        style="color:#4776e6;text-decoration:none">elevenlabs.io</a>.<br>
        Your key is saved only in this browser.
        Without a key, the built-in device voice is used.
      </div>
      <input id="elKeyInput" type="password" class="admin-input"
             placeholder="Paste ElevenLabs API key here..."/>
      <select id="elVoiceSelect" class="admin-select">
        <option value="MF3mGyEYCl7XYWbV9V6O">Elli — warm, young (recommended)</option>
        <option value="jBpfuIE2acCO8z3wKNLl">Gigi — upbeat, enthusiastic</option>
        <option value="21m00Tcm4TlvDq8ikWAM">Rachel — calm, clear</option>
        <option value="ThT5KcBeYPX3keUQqHPh">Dorothy — warm, pleasant</option>
        <option value="pNInz6obpgDQGcFmaJgB">Adam — friendly, clear</option>
      </select>
      <div class="admin-row">
        <button class="admin-btn-sm" onclick="saveVoiceSettings()">Save</button>
        <button class="admin-btn-sm admin-btn-blue" onclick="testVoice()">Test Voice</button>
      </div>
      <div id="voiceStatus" style="font-size:11px;color:#aaa;text-align:center;min-height:16px"></div>
    </div>

    <div class="admin-section-label">Responses</div>
    <div class="admin-log" id="adminLog">No answers yet.</div>

    <button class="admin-btn-sm admin-btn-gold" style="width:100%;margin-bottom:5px;padding:8px;font-size:12px;border-radius:8px"
            onclick="exportCSV()">Download Results (CSV)</button>
    <button class="admin-btn-sm" style="width:100%;margin-bottom:5px;padding:8px;font-size:12px;border-radius:8px"
            onclick="skipPair()">Skip this pair</button>
    <button class="admin-btn-sm" style="width:100%;padding:8px;font-size:12px;border-radius:8px"
            onclick="skipEnd()">Skip to End</button>`;

  // Restore saved values
  const ki = document.getElementById('elKeyInput');
  const vs = document.getElementById('elVoiceSelect');
  if (ki) ki.value = S.elevenLabsKey;
  if (vs) vs.value = S.elevenLabsVoice;

  document.getElementById('adminBtn').addEventListener('click', () => {
    S.adminOpen = !S.adminOpen;
    panel.classList.toggle('open', S.adminOpen);
    updateAdmin();
  });

  updateAdmin();
}

function saveVoiceSettings() {
  const ki = document.getElementById('elKeyInput');
  const vs = document.getElementById('elVoiceSelect');
  const st = document.getElementById('voiceStatus');
  S.elevenLabsKey   = ki ? ki.value.trim() : '';
  S.elevenLabsVoice = vs ? vs.value : 'MF3mGyEYCl7XYWbV9V6O';
  try {
    localStorage.setItem('rad_elKey',   S.elevenLabsKey);
    localStorage.setItem('rad_elVoice', S.elevenLabsVoice);
  } catch(e) {}
  if (st) {
    st.textContent = S.elevenLabsKey ? 'Saved! ElevenLabs voice active.' : 'Saved. Using built-in voice.';
    setTimeout(() => { st.textContent = ''; }, 2500);
  }
}

function testVoice() {
  saveVoiceSettings();
  stopSpeak();
  speak("Hello! I am the Friend Detective voice. Does this sound good to you?");
}

function updateAdmin() {
  const el = document.getElementById('adminLog');
  if (!el) return;
  if (!S.answers.length) { el.textContent = 'No answers yet.'; return; }
  el.textContent = S.answers.map(a =>
    `V${a.vid} Q${a.qi+1} [${a.vM}>${a.qM}]: ${a.ans} (key:${a.keyed}) ${a.ok ? 'ok' : 'x'}`
  ).join('\n');
}

// ── CSV EXPORT ────────────────────────────────────────────────
function exportCSV() {
  const rows = ['ChildName,VignetteID,VigModel,QIndex,QModel,ChildAnswer,KeyedAnswer,Correct,Timestamp'];
  S.answers.forEach(a =>
    rows.push(`${S.name},${a.vid},${a.vM},${a.qi+1},${a.qM},${a.ans},${a.keyed},${a.ok},${a.ts}`)
  );
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href     = url;
  link.download = `RAD15C_${S.name||'child'}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  try {
    initVoices();
    setupAdmin();
    render();
  } catch(err) {
    document.getElementById('app').innerHTML = `<div class="error-box">
      <h2 style="color:#e74c3c">Could not start the game</h2>
      <p style="margin:10px 0"><strong>${err.message}</strong></p>
      <pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:12px;
                  text-align:left;overflow:auto">${err.stack||''}</pre>
    </div>`;
    console.error(err);
  }
});

window.addEventListener('keydown', e => {
  if (e.key === 'Backspace' && e.target.tagName !== 'INPUT') e.preventDefault();
});

</script>
