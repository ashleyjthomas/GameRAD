<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Friend Detective 🔍</title>
<style>

/* ─── RESET & BASE ─────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', Arial, sans-serif;
  background: linear-gradient(160deg, #a8edea, #fed6e3);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

#app {
  width: 100%;
  max-width: 760px;
  background: #FFFEF7;
  border-radius: 22px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 580px;
}

/* ─── PROGRESS BAR ──────────────────────────────────────────── */
.prog-wrap {
  background: #F0EDE8;
  height: 13px;
  border-radius: 7px;
  margin: 12px 18px 0;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 7px;
  transition: width .55s ease;
}
.prog-label {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin: 3px 0 0;
}

/* ─── SCREEN CONTAINER ──────────────────────────────────────── */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 18px 20px;
  animation: fadeIn .35s ease;
  gap: 10px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0);   }
}

/* ─── WELCOME ───────────────────────────────────────────────── */
.wt {
  font-size: 40px;
  font-weight: bold;
  text-align: center;
  line-height: 1.2;
  background: linear-gradient(135deg, #f7971e, #f64f59);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.ws { font-size: 19px; color: #888; text-align: center; }
.name-wrap { text-align: center; }
.name-wrap label { display: block; font-size: 17px; color: #666; margin-bottom: 6px; }
.name-input {
  font-family: inherit;
  font-size: 20px;
  padding: 10px 18px;
  border: 3px solid #FFD200;
  border-radius: 50px;
  outline: none;
  width: 215px;
  text-align: center;
  color: #333;
  background: #FFFEF7;
}
.name-input:focus {
  border-color: #F7971E;
  box-shadow: 0 0 0 4px rgba(247,151,30,.15);
}

/* ─── BUTTONS ───────────────────────────────────────────────── */
.btn {
  font-family: inherit;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 50px;
  padding: 12px 28px;
  cursor: pointer;
  transition: transform .1s, box-shadow .1s;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
  -webkit-tap-highlight-color: transparent;
}
.btn:active  { transform: scale(.95); }
.btn:disabled { opacity: .45; cursor: not-allowed; }

.btn-primary  { background: linear-gradient(135deg,#f7971e,#ffd200); color: white; }
.btn-secondary{ background: #F0EDE8; color: #555; font-size: 15px; padding: 9px 20px; }
.btn-audio    { background: linear-gradient(135deg,#4776e6,#8e54e9); color: white; font-size: 16px; padding: 10px 22px; }

.btn-green {
  background: linear-gradient(135deg,#56ab2f,#a8e063);
  color: white;
  font-size: 24px;
  padding: 18px 0;
  box-shadow: 0 6px 20px rgba(86,171,47,.4);
  flex: 1;
  max-width: 190px;
  justify-content: center;
}
.btn-red {
  background: linear-gradient(135deg,#eb3349,#f45c43);
  color: white;
  font-size: 24px;
  padding: 18px 0;
  box-shadow: 0 6px 20px rgba(235,51,73,.4);
  flex: 1;
  max-width: 190px;
  justify-content: center;
}

/* ─── ILLUSTRATION ──────────────────────────────────────────── */
.illus {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  background: #E8F4FF;
  box-shadow: inset 0 2px 8px rgba(0,0,0,.07);
}
.illus svg { display: block; width: 100%; height: auto; }

/* ─── STORY SCREEN ──────────────────────────────────────────── */
.story-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}
.pair-title { font-size: 20px; font-weight: bold; color: #333; }

.audio-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: #bbb;
}
.audio-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #ddd;
  transition: background .3s;
  flex-shrink: 0;
}
.audio-dot.on {
  background: #4CAF50;
  animation: pulse 1s ease infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1);    }
  50%      { transform: scale(1.4); }
}

.story-box {
  width: 100%;
  background: white;
  border-radius: 12px;
  padding: 13px 17px;
  font-size: 17px;
  line-height: 1.75;
  color: #333;
  border: 2px solid #F0EDE8;
}
.sent { display: inline; border-radius: 4px; padding: 1px 2px; transition: background .3s; }
.sent.hi { background: #FFF3B0; }

.story-btns {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

/* ─── QUESTION SCREEN ───────────────────────────────────────── */
.q-header {
  width: 100%;
  background: linear-gradient(135deg,#4776e6,#8e54e9);
  border-radius: 11px;
  padding: 9px 15px;
  color: white;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.q-box {
  width: 100%;
  background: #F8F4FF;
  border-radius: 14px;
  padding: 16px 20px;
  font-size: 19px;
  line-height: 1.6;
  color: #333;
  border: 3px solid #C9B8F0;
  text-align: center;
  min-height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ans-row {
  display: flex;
  gap: 18px;
  justify-content: center;
  width: 100%;
}
.q-replay {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

/* ─── EXAMPLE EXPLANATION BOX ───────────────────────────────── */
.ex-explain {
  display: none;
  width: 100%;
  background: #E8F8E8;
  border: 2px solid #A5D6A7;
  border-radius: 12px;
  padding: 13px 17px;
  font-size: 16px;
  color: #2E7D32;
  text-align: center;
  line-height: 1.6;
}

/* ─── FEEDBACK POP ──────────────────────────────────────────── */
.fb-wrap {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 999;
}
.fb-emoji {
  font-size: 96px;
  animation: popIn .85s ease forwards;
  opacity: 0;
}
@keyframes popIn {
  0%   { transform: scale(.1);  opacity: 0; }
  45%  { transform: scale(1.3); opacity: 1; }
  75%  { transform: scale(1.0); opacity: 1; }
  100% { transform: scale(.6);  opacity: 0; }
}

/* ─── TRANSITION SCREEN ─────────────────────────────────────── */
.trans-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px;
  text-align: center;
}
.trans-star  { font-size: 96px; animation: starIn .7s ease; }
@keyframes starIn {
  0%   { transform: scale(0) rotate(-180deg); }
  70%  { transform: scale(1.25) rotate(10deg); }
  100% { transform: scale(1)   rotate(0);    }
}
.trans-msg  { font-size: 26px; font-weight: bold; color: #333; }
.trans-next { font-size: 18px; color: #999; }

/* ─── END SCREEN ────────────────────────────────────────────── */
.end-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
  gap: 13px;
}
.end-trophy { font-size: 100px; animation: bounceIn .8s ease; }
@keyframes bounceIn {
  0%   { transform: scale(0);    }
  60%  { transform: scale(1.18); }
  80%  { transform: scale(.94);  }
  100% { transform: scale(1);    }
}
.end-title { font-size: 34px; font-weight: bold; color: #f7971e; }
.end-sub   { font-size: 19px; color: #666; }
.end-btns  { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }

/* ─── ADMIN PANEL ───────────────────────────────────────────── */
.admin-btn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(0,0,0,.13);
  border: none;
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
}
.admin-panel {
  position: fixed;
  bottom: 54px;
  right: 10px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  padding: 14px;
  width: 280px;
  z-index: 500;
  font-size: 13px;
  display: none;
}
.admin-panel.open { display: block; }
.admin-panel h3 {
  font-size: 15px;
  margin-bottom: 9px;
  color: #333;
  border-bottom: 1px solid #eee;
  padding-bottom: 7px;
}
.admin-log {
  max-height: 190px;
  overflow-y: auto;
  font-size: 11.5px;
  font-family: monospace;
  background: #f8f8f8;
  border-radius: 6px;
  padding: 7px;
  margin-bottom: 9px;
  white-space: pre;
  line-height: 1.5;
}

/* ─── INTRO INFO
