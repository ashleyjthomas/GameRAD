<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Friend Detective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Fredoka', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
  background: linear-gradient(160deg, #a8edea, #fed6e3);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
#app {
  width: 100%; max-width: 760px;
  background: #FFFEF7; border-radius: 22px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
  min-height: 580px;
}
.star-meter-wrap {
  display: flex; flex-direction: column;
  align-items: center; padding: 8px 16px 3px; gap: 2px;
}
.star-meter {
  display: flex; gap: 2px;
  justify-content: center; flex-wrap: nowrap; align-items: center;
}
.star-item {
  font-size: 17px; color: #E0E0E0; line-height: 1;
  display: inline-block; transition: color 0.3s;
}
.star-item.filled { color: #FFD700; text-shadow: 0 0 5px rgba(255,180,0,.65); }
.star-item.newly-filled { animation: starPop 0.8s cubic-bezier(0.17,0.67,0.37,1.5) forwards; }
@keyframes starPop {
  0%   { transform: scale(0.1) rotate(-190deg); }
  65%  { transform: scale(1.5) rotate(8deg); }
  100% { transform: scale(1)   rotate(0deg); }
}
.star-meter-lbl { font-size: 10px; color: #ccc; }
.star-meter-large { flex-wrap: wrap; max-width: 220px; gap: 6px; }
.star-meter-large .star-item { font-size: 34px; }
.meter-bar-wrap {
  width: 220px; height: 20px; background: #E8E8E8;
  border-radius: 10px; overflow: hidden; position: relative;
  margin: 8px auto 0;
}
.meter-bar {
  height: 100%; border-radius: 10px;
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}
.meter-pct {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #555; font-weight: 600;
}
.level-badge {
  text-align: center; animation: bounceIn .85s cubic-bezier(.17,.67,.37,1.3);
}
.screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 11px 17px 17px;
  animation: fadeIn .35s ease; gap: 9px;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0);   }
}
.wt {
  font-size: 36px; font-weight: 600; text-align: center; line-height: 1.2;
  background: linear-gradient(135deg,#f7971e,#f64f59);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ws { font-size: 16px; color: #888; text-align: center; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; }
.form-group { text-align: center; }
.form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; }
.name-input, .age-select {
  font-family: inherit; font-size: 18px; padding: 9px 14px;
  border: 3px solid #FFD200; border-radius: 50px;
  outline: none; text-align: center; color: #333; background: #FFFEF7;
}
.name-input { width: 180px; }
.age-select { width: 140px; cursor: pointer; }
.name-input:focus, .age-select:focus {
  border-color: #F7971E; box-shadow: 0 0 0 4px rgba(247,151,30,.13);
}
.btn {
  font-family: inherit; font-size: 17px; font-weight: 600;
  border: none; border-radius: 50px; padding: 11px 24px;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
  display: inline-flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.14);
  -webkit-tap-highlight-color: transparent;
}
.btn:active  { transform: scale(.95); }
.btn:disabled { opacity:.44; cursor:not-allowed; }
.btn-primary   { background: linear-gradient(135deg,#f7971e,#ffd200); color:white; }
.btn-secondary { background:#F0EDE8; color:#555; font-size:14px; padding:8px 17px; }
.btn-audio     { background: linear-gradient(135deg,#4776e6,#8e54e9); color:white; font-size:14px; padding:8px 16px; }
.btn-story-replay { background: linear-gradient(135deg,#2196F3,#21CBF3); color:white; font-size:14px; padding:8px 16px; border:none; border-radius:50px; cursor:pointer; font-family:inherit; font-weight:600; box-shadow:0 3px 10px rgba(0,0,0,.12); -webkit-tap-highlight-color:transparent; }
.btn-story-replay:active { transform:scale(.95); }
.btn-green {
  background: linear-gradient(135deg,#56ab2f,#a8e063); color:white;
  font-size:22px; padding:14px 18px;
  box-shadow: 0 6px 20px rgba(86,171,47,.38);
  flex:1; max-width:165px;
  justify-content:center; flex-direction:column; gap:5px; border-radius:20px;
}
.btn-red {
  background: linear-gradient(135deg,#eb3349,#f45c43); color:white;
  font-size:22px; padding:14px 18px;
  box-shadow: 0 6px 20px rgba(235,51,73,.38);
  flex:1; max-width:165px;
  justify-content:center; flex-direction:column; gap:5px; border-radius:20px;
}
.ans-thumb { display:block; margin:0 auto; object-fit:contain; }
.btn-green .ans-thumb { animation: faceBounce 1.1s ease-in-out infinite; }
.btn-red   .ans-thumb { animation: faceWiggle 1.7s ease-in-out infinite; }
@keyframes faceBounce {
  0%,100%{transform:translateY(0) scale(1);} 45%{transform:translateY(-7px) scale(1.09);}
}
@keyframes faceWiggle {
  0%,100%{transform:rotate(0deg);} 22%{transform:rotate(-9deg);} 62%{transform:rotate(9deg);}
}
.btn-likert-strong {
  font-family:inherit; font-size:15px; font-weight:600;
  border:none; border-radius:20px; padding:12px 10px;
  cursor:pointer; transition:transform .1s, box-shadow .1s;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:5px; flex:1; max-width:170px;
  box-shadow:0 6px 18px rgba(0,0,0,.18);
  -webkit-tap-highlight-color:transparent;
}
.btn-likert-mild {
  font-family:inherit; font-size:14px; font-weight:600;
  border:none; border-radius:20px; padding:10px 8px;
  cursor:pointer; transition:transform .1s, box-shadow .1s;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:4px; flex:1; max-width:145px;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  -webkit-tap-highlight-color:transparent;
}
.btn-likert-strong:active, .btn-likert-mild:active { transform:scale(.95); }
.btn-likert-strong:disabled, .btn-likert-mild:disabled { opacity:.44; cursor:not-allowed; }
/* NEW — model identification buttons */
.btn-model-choice {
  background: white;
  border: 3px solid #E0E0E0;
  border-radius: 16px;
  padding: 10px;
  cursor: pointer;
  transition: transform .1s, border-color .1s, box-shadow .1s;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-model-choice:active  { transform: scale(.95); }
.btn-model-choice:hover   { border-color: #4776e6; box-shadow: 0 4px 16px rgba(71,118,230,.25); }
.btn-model-choice:disabled { opacity: .5; cursor: not-allowed; }
.illus {
  width:100%; border-radius:13px; overflow:hidden;
  background:#E8F4FF; box-shadow: inset 0 2px 8px rgba(0,0,0,.07);
}
.q-illust {
  width:100%; max-width:360px; align-self:center;
  border-radius:12px; overflow:hidden;
  border:2px solid #F0EDE8; background:#FAFAFA;
}
.story-head { display:flex; justify-content:space-between; align-items:center; width:100%; }
.pair-title  { font-size:18px; font-weight:600; color:#333; }
.story-box {
  width:100%; background:white; border-radius:12px;
  padding:11px 15px; font-size:16px; line-height:1.72;
  color:#333; border:2px solid #F0EDE8;
}
.sent { display:inline; border-radius:4px; padding:1px 2px; transition:background .3s; }
.sent.hi { background:#FFF3B0; }
.story-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; }
.q-header {
  width:100%; background:linear-gradient(135deg,#4776e6,#8e54e9);
  border-radius:11px; padding:8px 14px; color:white;
  font-size:14px; display:flex; align-items:center; gap:6px;
}
.q-box {
  width:100%; background:#F8F4FF; border-radius:13px;
  padding:12px 16px; font-size:16px; line-height:1.6;
  color:#333; border:3px solid #C9B8F0;
  text-align:center; min-height:66px;
  display:flex; align-items:center; justify-content:center;
}
.ans-row   { display:flex; gap:15px; justify-content:center; width:100%; }
.replay-section { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }
.replay-label { font-size:11px; color:#bbb; text-align:center; }
.replay-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.ex-explain {
  display:none; width:100%;
  background:#E8F8E8; border:2px solid #A5D6A7; border-radius:12px;
  padding:11px 15px; font-size:15px; color:#2E7D32;
  text-align:center; line-height:1.6;
}
.thumb-guide {
  display:flex; gap:18px; justify-content:center; align-items:center;
  background:rgba(71,118,230,.05); border-radius:10px; padding:7px 14px;
  border:1.5px solid rgba(71,118,230,.15); font-size:13px; color:#666;
}
.trans-screen {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:10px; padding:22px; text-align:center;
}
.trans-msg { font-size:22px; font-weight:600; color:#333; }
.trans-sub { font-size:15px; color:#aaa; }
.end-screen {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px; text-align:center; gap:10px;
}
.end-trophy-wrap { animation: bounceIn .85s cubic-bezier(.17,.67,.37,1.3); }
@keyframes bounceIn {
  0%{transform:scale(0);} 65%{transform:scale(1.18);} 82%{transform:scale(.94);} 100%{transform:scale(1);}
}
.end-title { font-size:29px; font-weight:600; color:#f7971e; }
.end-sub   { font-size:16px; color:#666; }
.end-btns  { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.admin-btn {
  position:fixed; bottom:10px; right:10px;
  width:34px; height:34px; border-radius:50%;
  background:rgba(0,0,0,.13); border:none; cursor:pointer;
  font-size:15px; display:flex; align-items:center; justify-content:center; z-index:500;
}
.admin-panel {
  position:fixed; bottom:54px; right:10px;
  background:white; border-radius:12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  padding:14px; width:295px; z-index:500;
  font-size:13px; display:none;
}
.admin-panel.open { display:block; }
.admin-panel h3 { font-size:14px; margin-bottom:8px; color:#333; border-bottom:1px solid #eee; padding-bottom:5px; }
.admin-section-label { font-weight:600; font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.admin-log {
  max-height:120px; overflow-y:auto; font-size:10px;
  font-family:monospace; background:#f8f8f8;
  border-radius:6px; padding:6px; margin-bottom:7px; white-space:pre; line-height:1.5;
}
.admin-input, .admin-select {
  width:100%; padding:5px 7px; font-size:11px;
  border:1px solid #ddd; border-radius:6px;
  margin-bottom:5px; outline:none; background:white;
}
.admin-row { display:flex; gap:5px; margin-bottom:5px; }
.admin-btn-sm {
  flex:1; padding:6px 4px; font-size:11px; font-family:inherit;
  border-radius:6px; cursor:pointer; border:1px solid #ddd; background:#F0EDE8; color:#555;
}
.admin-btn-blue { background:#4776e6; color:white; border-color:#4776e6; }
.admin-btn-gold { background:linear-gradient(135deg,#f7971e,#ffd200); color:white; border:none; font-weight:600; }
.info-box {
  font-size:15px; color:#555; line-height:1.82;
  max-width:500px; background:#F8F4FF;
  padding:14px 18px; border-radius:14px; border:3px solid #C9B8F0;
}
.error-box { padding:28px; font-family:Arial,sans-serif; max-width:600px; margin:auto; text-align:center; }
.unlock-btn {
  background: linear-gradient(135deg,#4776e6,#8e54e9);
  color: white; border: none; border-radius: 50px;
  font-family: inherit; font-size: 17px; font-weight: 600;
  padding: 13px 28px; cursor: pointer;
  box-shadow: 0 4px 18px rgba(71,118,230,.45);
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }
@media (max-width:480px) {
  .wt { font-size:25px; }
  .btn-green,.btn-red { font-size:18px; max-width:138px; }
  .q-box { font-size:14px; }
  .story-box { font-size:14px; }
  .trans-msg { font-size:18px; }
  .star-meter-large .star-item { font-size:26px; }
}
</style>
</head>
<body>

<div id="app">
  <div style="padding:44px;text-align:center;font-family:Arial,sans-serif;color:#aaa">
    <div style="font-size:54px;margin-bottom:14px">🔍</div>
    <h2>Loading Friend Detective...</h2>
    <p style="margin-top:10px;font-size:14px">If this does not go away, please check that JavaScript is enabled.</p>
  </div>
</div>

<button class="admin-btn" id="adminBtn" title="Researcher Panel">⚙️</button>
<div class="admin-panel" id="adminPanel"></div>

<script>
'use strict';

const W = 600, H = 300, GY = H * 0.70;
const IMG_BASE = 'https://raw.githubusercontent.com/ashleyjthomas/GameRAD/main/';

// ── KUDOS ──────────────────────────────────────────────
const KUDOS = [
  "Brilliant work on that one!",
  "Excellent thinking — you are really good at this!",
  "Wonderful job! I love how carefully you are thinking!",
  "Amazing detective work! Keep it up!",
  "You are so good at this! Wow!",
  "Fantastic! You are a true Friend Detective!",
  "That was great! I am really impressed!",
  "Super job! You are doing wonderfully!"
];

// ── DETECTIVE LEVELS ───────────────────────────────────
const DETECTIVE_LEVELS = [
  { min:  0, label: 'Rookie Detective',   emoji: '🔍', color: '#7EDBFF', color2: '#4A90D9' },
  { min:  3, label: 'Detective Cadet',    emoji: '🕵️', color: '#6BCB77', color2: '#27AE60' },
  { min:  6, label: 'Senior Detective',   emoji: '⭐', color: '#FFD166', color2: '#F39C12' },
  { min:  9, label: 'Super Detective',    emoji: '💫', color: '#FF8FAB', color2: '#E91E8C' },
  { min: 12, label: 'Master Detective!',  emoji: '🏆', color: '#FFD700', color2: '#F39C12' }
];

function getCurrentLevel(stars) {
  let lv = DETECTIVE_LEVELS[0];
  for (const l of DETECTIVE_LEVELS) { if (stars >= l.min) lv = l; }
  return lv;
}

// ── EXAMPLE ────────────────────────────────────────────
const EXAMPLE = {
  id: 'ex',
  char1: { name: 'Alien 1', hair: '#9B5DE5', shirt: '#4ECDC4', pants: '#1A3040', style: 'short' },
  char2: { name: 'Alien 2', hair: '#FFD84D', shirt: '#FF6EC7', pants: '#2E1E60', style: 'short' },
  scene: 'trading_post',
  parts: [
    'These two aliens live on Planet Zazzo.',
    'Last moon-cycle, they collected gaxa fruits together. One split the fruits into two exactly equal piles, and the other picked the pile they wanted.',
    'Last week, one gave the other some flurp-berries. So the other made sure to bring back the same number of flurp-berries in return.'
  ],
  questions: [
    {
      text: 'These two aliens take turns using the zibble game so they each get the same amount of time.',
      keyed: 'YES', qIllust: 'computer',
      explain: 'Since these aliens like things to be fair and equal — they split fruits evenly and always give back what they receive — taking turns on the zibble game sounds just like them! YES makes sense here.'
    },
    {
      text: 'One alien decides what games they do, and the other just goes along with it.',
      keyed: 'NO', qIllust: 'boss',
      explain: 'These aliens treat each other as equals, so it does not sound like just one of them would always be in charge. NO makes more sense here.'
    },
    {
      text: 'When they collected moon-rocks to build a tower, these two each put in exactly the same number of rocks.',
      keyed: 'YES', qIllust: 'coins',
      explain: 'Putting in the same amount fits their style perfectly — they always like things to be fair and equal between them. YES!'
    }
  ]
};

// ── TEST ITEMS (NEW) ───────────────────────────────────
const TEST_ITEMS = {
  EM: [
    { id: 'EM1', text: '{char1} and {char2} take turns using the star-viewer to make sure they each get the same amount of time.',                                                              png: 'EMstarviewer.png'    },
    { id: 'EM2', text: 'When their group worked together to build something, {char1} and {char2} each put in the exact same number of moon-rocks.',                                             png: 'EMmoonrocktower.png' },
    { id: 'EM3', text: '{char1} and {char2} both carefully keep track of how many times they have borrowed each other\'s things, to make sure it stays even between them.',                     png: 'EMevenborrowing.png' },
    { id: 'EM4', text: 'When {char1} and {char2} share things, they make sure each of them has exactly the same amount before anyone takes any.',                                               png: 'EMequalfruit2.png'   },
    { id: 'EM5', text: '{char1} and {char2} take turns choosing what to do each day, so they each get the same number of choices.',                                                            png: 'EMtaketurnschoice.png'},
    { id: 'EM6', text: 'When {char1} gave {char2} a glurp, {char2} made sure to give {char1} a glurp of the same size back.',                                                                 png: 'EMgift.png'          },
    { id: 'EM7', text: '{char1} and {char2} keep track of who has used more things so they can balance it out later.',                                                                         png: 'EMtallycave.png'     },
    { id: 'EM8', text: 'When {char1} and {char2} need to make a choice, they each get one vote — and neither one gets more say than the other.',                                               png: 'EMvoting.png'        }
  ],
  CS: [
    { id: 'CS1', text: 'When {char1} and {char2} share food, they eat from the same big bowl without counting who has more.',                                                                  png: 'CSsamebowl.png'      },
    { id: 'CS2', text: 'When either {char1} or {char2} wins a prize, both feel equally happy and proud — as though they both won together.',                                                   png: 'CSsproud.png'        },
    { id: 'CS3', text: 'When either {char1} or {char2} finds something nice, they bring it straight to the other to share — not because they have to, just because they share everything.',    png: 'CScrystalshare.png'  },
    { id: 'CS4', text: 'When {char1} and {char2} walk somewhere together, they always hold hands because it makes them feel like one.',                                                        png: 'CSholdinghands.png'  },
    { id: 'CS5', text: '{char1} and {char2} share all their things freely — if one of them wants to use something, they just take it without asking.',                                         png: 'CSsharedstuff.png'   },
    { id: 'CS6', text: 'When {char2} felt sad, {char1} felt it too, right in their own chest — as if their feelings were one and the same.',                                                  png: 'CSsharedpain.png'    },
    { id: 'CS7', text: 'Whenever one of them is feeling sad, the other feels sad too — and they hold each other until they both feel better.',                                                 png: 'CShugging.png'       },
    { id: 'CS8', text: '{char1} and {char2} feel like they have always been together and always will be — like two parts of the same thing.',                                                  png: 'CSpuzzle.png'        }
  ],
  AR: [
    { id: 'AR1', text: '{char1} makes the decisions and {char2} follows them.',                                                                                                                png: 'ARboss.png'          },
    { id: 'AR2', text: '{char2} is careful not to interrupt {char1} when they are talking, but {char1} interrupts {char2} sometimes.',                                                        png: 'ARinterrupt.png'     },
    { id: 'AR3', text: '{char1} tells {char2} when they do not like something {char2} did, but {char2} does not tell {char1} when they do not like something {char1} did.',                   png: 'ARfeedback.png'      },
    { id: 'AR4', text: 'When {char1} and {char2} made something together, {char1} said their name had to go at the top.',                                                                     png: 'ARart.png'           },
    { id: 'AR5', text: 'When {char1} and {char2} are together, {char1} makes the rules. If {char1} changes a rule, {char2} just goes along with it.',                                        png: 'ARrules.png'         },
    { id: 'AR6', text: '{char2} always follows {char1}\'s lead because {char1} is the one who decides where they go.',                                                                        png: 'ARpathchoose.png'    },
    { id: 'AR7', text: '{char1} always picks the best things first, and {char2} takes whatever is left over.',                                                                                png: 'ARbiggerpile.png'    },
    { id: 'AR8', text: 'When they sit down together, {char1} always gets to sit in the biggest chair. {char2} sits in a smaller one.',                                                        png: 'ARchair.png'         }
  ]
};

// ── FILL NAME PLACEHOLDERS (NEW) ──────────────────────
function fillNames(text, v) {
  return text
    .replace(/\{char1\}/g, v.char1.name)
    .replace(/\{char2\}/g, v.char2.name);
}

// ── ASSIGN RANDOM QUESTIONS TO EACH VIGNETTE (NEW) ────
function assignAllQuestions() {
  // Shuffle each pool independently
  const pools = {
    EM: [...TEST_ITEMS.EM].sort(() => Math.random() - 0.5),
    CS: [...TEST_ITEMS.CS].sort(() => Math.random() - 0.5),
    AR: [...TEST_ITEMS.AR].sort(() => Math.random() - 0.5)
  };
  const counters = { EM: 0, CS: 0, AR: 0 };

  function pick(model) {
    const arr = pools[model];
    const item = arr[counters[model] % arr.length];
    counters[model]++;
    return item;
  }

  VIGNETTES.forEach(v => {
    const questions = ['EM', 'CS', 'AR'].map(m => {
      const item = pick(m);
      return {
        id:        item.id,
        text:      fillNames(item.text, v),
        qM:        m,
        png:       item.png,
        keyed:     m === v.model ? 'YES' : 'NO',
        congruent: m === v.model
      };
    });
    // Shuffle question order
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    v.questions = questions;
  });
}

// ── SPEECH ─────────────────────────────────────────────
let voices = [], currentAudio = null, seqGen = 0, audioUnlocked = false;

function initVoices() {
  function load() { const v = speechSynthesis.getVoices(); if (v.length) voices = v; }
  load();
  speechSynthesis.onvoiceschanged = load;
}

function unlockAudio(thenSpeak) {
  if (audioUnlocked) { if (thenSpeak) speak(thenSpeak); return; }
  audioUnlocked = true;
  if (window.speechSynthesis) {
    const silent = new SpeechSynthesisUtterance(' ');
    silent.volume = 0;
    silent.onend = () => { if (thenSpeak) speak(thenSpeak); };
    speechSynthesis.speak(silent);
  } else { if (thenSpeak) speak(thenSpeak); }
  const ub = document.getElementById('unlockBtn');
  if (ub) ub.remove();
}

function bestVoice() {
  const prefs = ['Google UK English Female','Samantha','Karen','Moira','Google US English','Microsoft Zira Desktop - English (United States)','Microsoft Zira - English (United States)'];
  for (const p of prefs) { const v = voices.find(v => v.name === p || v.name.includes(p)); if (v) return v; }
  return voices.find(v => v.lang && v.lang.startsWith('en') && v.localService) ||
         voices.find(v => v.lang && v.lang.startsWith('en')) || voices[0] || null;
}

function speak(text, done) {
  done = done || function(){};
  if (!text || !text.trim()) { done(); return; }
  if (S.elevenLabsKey && S.elevenLabsKey.trim()) { speakElevenLabs(text, done); }
  else { speakWebSpeech(text, done); }
}

function speakWebSpeech(text, done) {
  done = done || function(){};
  if (!window.speechSynthesis) { done(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = bestVoice(); u.rate = 1.06; u.pitch = 1.08; u.volume = 1;
  u.onend = () => { done(); };
  u.onerror = () => { done(); };
  speechSynthesis.speak(u);
}

function speakElevenLabs(text, done) {
  done = done || function(){};
  const voiceId = S.elevenLabsVoice || 'MF3mGyEYCl7XYWbV9V6O';
  fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: 'POST',
    headers: { 'Accept':'audio/mpeg','Content-Type':'application/json','xi-api-key':S.elevenLabsKey },
    body: JSON.stringify({ text, model_id:'eleven_turbo_v2', voice_settings:{ stability:0.42, similarity_boost:0.75, style:0.38, use_speaker_boost:true, speed:1.25 } })
  })
  .then(r => { if (!r.ok) throw new Error('ElevenLabs ' + r.status); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; done(); };
    audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; speakWebSpeech(text, done); };
    audio.play().catch(() => { speakWebSpeech(text, done); });
  })
  .catch(err => { console.warn('ElevenLabs error:', err.message); speakWebSpeech(text, done); });
}

function speakSeq(parts, highlightCb, done) {
  const id = ++seqGen;
  let i = 0;
  function next() {
    if (seqGen !== id) return;
    if (i >= parts.length) { done(); return; }
    if (highlightCb) highlightCb(i);
    speak(parts[i], () => { i++; next(); });
  }
  next();
}

function stopSpeak() {
  seqGen++;
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const SKINS = ['#FDBCB4','#F0C090','#E0A878','#C87E50','#FDDBB4'];
function skin(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h*31 + name.charCodeAt(i)) & 0xFFFF;
  return SKINS[h % SKINS.length];
}

// ── KID SVG ────────────────────────────────────────────
function kidSVG(cx, groundY, cfg, animOffset, flip, imgH, imgYOffset) {
  imgH        = imgH        || 182;
  imgYOffset  = imgYOffset  || 35;
  animOffset  = animOffset  || '0s';
  flip        = flip        || false;
  const { hair, shirt, pants, style, img } = cfg;
  const bobBegin = (animOffset === 'wave') ? '0s' : animOffset;

  if (img && animOffset !== 'wave') {
    const imgUrl = IMG_BASE + img;
    const imgW = Math.round(imgH * 88 / 182);
    const p = [];
    p.push(`<ellipse cx="${cx}" cy="${groundY}" rx="26" ry="6" fill="rgba(0,0,0,.10)"/>`);
    const imgEl = `<image href="${imgUrl}" x="${cx - imgW/2}" y="${groundY - imgH + imgYOffset}" width="${imgW}" height="${imgH}" preserveAspectRatio="xMidYMax meet"/>`;
    if (flip) {
      p.push(`<g transform="translate(${cx * 2}, 0) scale(-1, 1)">${imgEl}</g>`);
    } else {
      p.push(imgEl);
    }
    return `<g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="2.6s" begin="${bobBegin}" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>${p.join('')}</g>`;
  }

  const sk = skin(cfg.name || '');
  const hR=28, bH=62, bW=50, lH=58, lW=19, aH=44, aW=12;
  const fY=groundY, lT=fY-lH, bT=lT-bH, hY=bT-hR-3;
  const p = [];
  p.push(`<ellipse cx="${cx}" cy="${fY}" rx="26" ry="6" fill="rgba(0,0,0,.08)"/>`);
  p.push(`<rect x="${cx-lW-2}" y="${lT}" width="${lW}" height="${lH}" rx="6" fill="${pants}"/>`);
  p.push(`<rect x="${cx+2}"    y="${lT}" width="${lW}" height="${lH}" rx="6" fill="${pants}"/>`);
  p.push(`<ellipse cx="${cx-lW*.5-1}" cy="${fY}" rx="13" ry="6" fill="#333"/>`);
  p.push(`<ellipse cx="${cx+lW*.5+1}" cy="${fY}" rx="13" ry="6" fill="#333"/>`);
  p.push(`<rect x="${cx-bW*.5-aW}" y="${bT+4}" width="${aW}" height="${aH}" rx="5" fill="${shirt}"/>`);
  p.push(`<circle cx="${cx-bW*.5-aW*.5}" cy="${bT+4+aH}" r="7" fill="${sk}"/>`);
  if (animOffset === 'wave') {
    const pvX = (cx+bW*.5+aW*.5).toFixed(1), pvY = (bT+8).toFixed(1);
    p.push(`<g><animateTransform attributeName="transform" type="rotate" values="-35 ${pvX} ${pvY}; 40 ${pvX} ${pvY}; -35 ${pvX} ${pvY}" dur="0.85s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <rect x="${cx+bW*.5}" y="${bT+4}" width="${aW}" height="${aH}" rx="5" fill="${shirt}"/>
      <circle cx="${cx+bW*.5+aW*.5}" cy="${bT+4+aH}" r="7" fill="${sk}"/>
    </g>`);
  } else {
    p.push(`<rect x="${cx+bW*.5}" y="${bT+4}" width="${aW}" height="${aH}" rx="5" fill="${shirt}"/>`);
    p.push(`<circle cx="${cx+bW*.5+aW*.5}" cy="${bT+4+aH}" r="7" fill="${sk}"/>`);
  }
  p.push(`<rect x="${cx-bW*.5}" y="${bT}" width="${bW}" height="${bH}" rx="10" fill="${shirt}"/>`);
  p.push(`<path d="M${cx-9},${bT} Q${cx},${bT+13} ${cx+9},${bT}" fill="white" opacity=".2"/>`);
  p.push(`<circle cx="${cx}" cy="${hY}" r="${hR}" fill="${sk}"/>`);
  if (style==='short') {
    p.push(`<ellipse cx="${cx}" cy="${hY-hR+10}" rx="${hR}" ry="${hR*.52}" fill="${hair}"/>`);
  } else if (style==='long') {
    p.push(`<ellipse cx="${cx}" cy="${hY-hR+10}" rx="${hR}" ry="${hR*.52}" fill="${hair}"/>`);
    p.push(`<rect x="${cx-hR-1}" y="${hY-6}" width="13" height="40" rx="6" fill="${hair}"/>`);
    p.push(`<rect x="${cx+hR-12}" y="${hY-6}" width="13" height="40" rx="6" fill="${hair}"/>`);
  } else if (style==='pigtails') {
    p.push(`<ellipse cx="${cx}" cy="${hY-hR+10}" rx="${hR}" ry="${hR*.52}" fill="${hair}"/>`);
    p.push(`<circle cx="${cx-hR-5}" cy="${hY-3}" r="10" fill="${hair}"/>`);
    p.push(`<circle cx="${cx+hR+5}" cy="${hY-3}" r="10" fill="${hair}"/>`);
    p.push(`<line x1="${cx-hR+1}" y1="${hY-1}" x2="${cx-hR-5}" y2="${hY-3}" stroke="${hair}" stroke-width="5"/>`);
    p.push(`<line x1="${cx+hR-1}" y1="${hY-1}" x2="${cx+hR+5}" y2="${hY-3}" stroke="${hair}" stroke-width="5"/>`);
  }
  p.push(`<path d="M${cx-14},${hY-2} Q${cx-8},${hY-12} ${cx-2},${hY-2}" stroke="#333" stroke-width="2.3" fill="none" stroke-linecap="round"/>`);
  p.push(`<path d="M${cx+2},${hY-2} Q${cx+8},${hY-12} ${cx+14},${hY-2}" stroke="#333" stroke-width="2.3" fill="none" stroke-linecap="round"/>`);
  p.push(`<path d="M${cx-10},${hY+9} Q${cx},${hY+19} ${cx+10},${hY+9}" stroke="#333" stroke-width="2.3" fill="none" stroke-linecap="round"/>`);
  p.push(`<circle cx="${cx-17}" cy="${hY+6}" r="6" fill="#FFA0A0" opacity=".42"/>`);
  p.push(`<circle cx="${cx+17}" cy="${hY+6}" r="6" fill="#FFA0A0" opacity=".42"/>`);
  return `<g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="2.6s" begin="${bobBegin}" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>${p.join('')}</g>`;

// ── SVG COMPOSITION ────────────────────────────────────
function svgInner(str) {
  return str.replace(/<svg[^>]*>/i, '').replace(/<\/svg>\s*$/i, '');
}
function bgSVG(scene) {
  return svgInner(SCENE_BACKGROUNDS[scene] || SCENE_BACKGROUNDS.alien_home);
}

function sceneSVG(v) {
  const pos = CHAR_POS[v.scene] || { x:[155,445], gy:GY, h:182, yo:35 };
  const [c1x, c2x] = pos.x;
  const gys = Array.isArray(pos.gy) ? pos.gy : [pos.gy, pos.gy];
  const { h, yo } = pos;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    ${bgSVG(v.scene)}
    ${kidSVG(c1x, gys[0], v.char1, '0s',   true,  h, yo)}
    ${kidSVG(c2x, gys[1], v.char2, '1.3s', false, h, yo)}
  </svg>`;
}

// ── STAR / LEVEL METER ─────────────────────────────────
function starHeaderHTML(earned, total) {
  const lv = getCurrentLevel(earned);
  const items = Array.from({length:total},(_,i)=>`<span class="star-item${i<earned?' filled':''}">\u2605</span>`).join('');
  return `<div class="star-meter-wrap">
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:2px">
      <span style="font-size:14px">${lv.emoji}</span>
      <span style="font-size:10px;font-weight:600;color:${lv.color2}">${lv.label}</span>
    </div>
    <div class="star-meter">${items}</div>
    <div class="star-meter-lbl">Pair ${S.vi+1} of ${total}</div>
  </div>`;
}

function starTransHTML(earned, total) {
  const pct  = Math.round((earned / total) * 100);
  const lv   = getCurrentLevel(earned);
  const prev = getCurrentLevel(Math.max(0, earned - 1));
  const levelUp = earned > 0 && lv.label !== prev.label;
  const items = Array.from({length:total},(_,i)=>{
    const filled=i<earned, isNew=filled&&i===earned-1;
    return `<span class="star-item${filled?' filled':''}${isNew?' newly-filled':''}">\u2605</span>`;
  }).join('');
  return `
    <div style="text-align:center;margin-bottom:6px">
      ${levelUp
        ? `<div class="level-badge"><div style="font-size:44px">${lv.emoji}</div><div style="font-size:18px;font-weight:600;color:${lv.color2};margin-top:2px">⬆ Level Up! ${lv.label}</div></div>`
        : `<div style="font-size:30px">${lv.emoji}</div><div style="font-size:13px;font-weight:600;color:${lv.color2}">${lv.label}</div>`
      }
    </div>
    <div class="star-meter star-meter-large">${items}</div>
    <div class="meter-bar-wrap">
      <div class="meter-bar" style="width:${pct}%;background:linear-gradient(90deg,${lv.color},${lv.color2})"></div>
      <span class="meter-pct">${earned} / ${total}</span>
    </div>`;
}

function replayQ() {
  const v  = exPhase() ? EXAMPLE : VIGNETTES[S.vi];
  const qi = exPhase() ? S.eqi   : S.qi;
  stopSpeak();
  speak(`Here is the question again. ${v.questions[qi].text}. Do you think ${v.char1.name} and ${v.char2.name} would act that way?`);
}

function replayStoryQ(isEx) {
  const v = isEx ? EXAMPLE : VIGNETTES[S.vi];
  stopSpeak();
  speak(`Sure! Let me remind you about ${v.char1.name} and ${v.char2.name}.`, () => {
    speakSeq(v.parts, null, () =>
      speak(`Okay! Now, what do you think?`)
    );
  });
}

function doAnswer(ans) {
  ['btnY','btnN'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = true; });
  const isEx = exPhase();
  const v    = isEx ? EXAMPLE : VIGNETTES[S.vi];
  const qi   = isEx ? S.eqi   : S.qi;
  const q    = v.questions[qi];
  flashBtn(ans);
  if (isEx) {
    const exDiv = document.getElementById('exExp');
    if (exDiv) { exDiv.style.display = 'block'; exDiv.textContent = q.explain || ''; }
    stopSpeak();
    const openers = ['Hmm, interesting thinking! Let me explain.','Nice guess! Here is what I was thinking.','Good job trying! Here is the reason.'];
    speak(`${openers[qi % openers.length]} ${q.explain || ''}`, () => {
      setTimeout(() => {
        if (S.eqi < EXAMPLE.questions.length - 1) {
          S.eqi++; S.phase = 'ex-q'; render();
        } else {
          S.phase = 'ex-done'; render();
        }
      }, 2200);
    });
  } else {
    S.pendingAns = ans;
    setTimeout(() => { S.phase = 'q-likert'; render(); }, 480);
  }
}

// CHANGED — added type:'test' and itemId fields
function doLikertAnswer(certainty) {
  ['btnDef','btnMay'].forEach(id => { const b = document.getElementById(id); if (b) b.disabled = true; });
  const btn = document.getElementById(certainty === 'DEFINITELY' ? 'btnDef' : 'btnMay');
  if (btn) { btn.style.transform = 'scale(1.1)'; setTimeout(() => { if (btn) btn.style.transform = ''; }, 300); }
  const v       = VIGNETTES[S.vi];
  const q       = v.questions[S.qi];
  const initAns = S.pendingAns;
  const fullAns = certainty === 'DEFINITELY'
    ? (initAns === 'YES' ? 'DEFINITELY_YES' : 'DEFINITELY_NO')
    : (initAns === 'YES' ? 'MAYBE_YES'      : 'MAYBE_NO');
  S.answers.push({
    type: 'test',                          // NEW
    vid: v.id, vM: v.model, qi: S.qi, qM: q.qM,
    itemId: q.id,                          // NEW
    ans: fullAns, initialAns: initAns,
    keyed: q.keyed, ok: initAns === q.keyed,
    congruent: q.congruent,
    ts: new Date().toISOString()
  });
  S.pendingAns = null;
  stopSpeak();
  setTimeout(() => {
    if (S.qi < 2) { S.qi++; S.phase = 'q'; }
    else          { S.stars++; S.phase = 'trans'; }
    render();
  }, 650);
}

// NEW — record model-id answer and move to test questions
function doModelId(chosenModel) {
  document.querySelectorAll('.btn-model-choice').forEach(b => b.disabled = true);
  const v = VIGNETTES[S.vi];
  S.answers.push({
    type: 'model-id',
    vid: v.id,
    vM: v.model,
    chosen: chosenModel,
    correct: chosenModel === v.model,
    ts: new Date().toISOString()
  });
  S.qi = 0;
  stopSpeak();
  setTimeout(() => { S.phase = 'q'; render(); }, 400);
}

function flashBtn(ans) {
  const b = document.getElementById(ans === 'YES' ? 'btnY' : 'btnN');
  if (!b) return;
  b.style.transition = 'transform 0.15s, box-shadow 0.15s';
  b.style.transform  = 'scale(1.14)';
  b.style.boxShadow  = '0 0 0 8px rgba(255,255,255,0.68)';
  setTimeout(() => { b.style.transform = ''; b.style.boxShadow = ''; }, 320);
}

function renderTrans() {
  const ni   = S.vi + 1;
  const last = ni >= VIGNETTES.length;
  const np   = last ? null : VIGNETTES[ni];
  const kudo = KUDOS[Math.floor(Math.random() * KUDOS.length)];
  app.innerHTML = `
  <div class="trans-screen">
    ${starTransHTML(S.stars, VIGNETTES.length)}
    <div class="trans-msg" style="margin-top:8px">${kudo}</div>
    <div style="font-size:19px;font-weight:600;color:#F39C12">${S.stars} star${S.stars===1?'':'s'} collected!</div>
    <div class="trans-sub">
      ${last
        ? 'That was the very last pair — you are almost done!'
        : `Next up: meet <strong>${escHtml(np.char1.name)}</strong> and <strong>${escHtml(np.char2.name)}</strong>!`}
    </div>
  </div>`;
  const lv   = getCurrentLevel(S.stars);
  const prev = getCurrentLevel(S.stars - 1);
  const lvUp = S.stars > 0 && lv.label !== prev.label;
  const msg  = last
    ? `${kudo} You just finished all twelve pairs! You are almost done now — what an amazing job!`
    : lvUp
      ? `${kudo} You leveled up to ${lv.label}! You have ${S.stars} star${S.stars===1?'':'s'} now! Next up, let us meet ${np.char1.name} and ${np.char2.name}!`
      : `${kudo} You collected a star! You have ${S.stars} star${S.stars===1?'':'s'} now! Next up, let us meet ${np.char1.name} and ${np.char2.name}!`;
  stopSpeak();
  speak(msg, () => {
    setTimeout(() => {
      if (last) { S.phase = 'end'; }
      else      { S.vi++; S.qi = 0; S.phase = 'story'; }
      render();
    }, 750);
  });
}

function renderEnd() {

// ── NAVIGATION ─────────────────────────────────────────
function exPhase() { return S.phase === 'ex-story' || S.phase === 'ex-q'; }

// CHANGED — real vignettes now go to model-id before test questions
function startGame() {
  const inp = document.getElementById('cname');
  const sel = document.getElementById('cage');
  S.name = (inp ? inp.value.trim() : '') || '';
  S.age  = (sel ? sel.value        : '') || '';
  if (!S.name) { unlockAudio("Oops! Can you type your name first?"); return; }
  audioUnlocked = true;

  // Shuffle vignette order
  for (let i = VIGNETTES.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [VIGNETTES[i], VIGNETTES[j]] = [VIGNETTES[j], VIGNETTES[i]];
  }

  // Assign random test items AFTER shuffling (NEW)
  assignAllQuestions();

  const pool = [];
  VIGNETTES.forEach(v => { pool.push(v.char1); pool.push(v.char2); });
  const i1 = Math.floor(Math.random() * pool.length);
  let i2;
  do { i2 = Math.floor(Math.random() * pool.length); } while (i2 === i1);
  EXAMPLE.char1 = Object.assign({}, pool[i1]);
  EXAMPLE.char2 = Object.assign({}, pool[i2]);

  S.phase = 'intro';
  render();
}

function goExStory()  { S.eqi = 0; S.phase = 'ex-story'; render(); }

// CHANGED — non-example path now goes to model-id first
function goQs(isEx) {
  if (isEx) {
    S.eqi = 0; S.phase = 'ex-q';
  } else {
    // Randomise the order of the three model images for this vignette
    S.modelIdOrder = ['EM', 'CS', 'AR'].sort(() => Math.random() - 0.5);
    S.phase = 'model-id';
  }
  render();
}

function startRealGame() { stopSpeak(); S.phase = 'story'; S.vi = 0; S.qi = 0; render(); }

// CHANGED — added model-id to the phases that can be skipped
function skipPair() {
  if (['story','model-id','q','q-likert'].includes(S.phase)) {
    S.pendingAns = null; S.stars++; S.phase = 'trans'; render();
  }
}

function skipEnd()   { stopSpeak(); S.phase = 'end'; render(); }

// CHANGED — reset modelIdOrder too
function resetGame() {
  stopSpeak();
  Object.assign(S, { phase:'welcome', name:'', age:'', vi:0, qi:0, eqi:0, pendingAns:null, modelIdOrder:[], answers:[], stars:0, adminOpen:false });
  render();
}

// CHANGED — handles both model-id and test answer types
function updateAdmin() {
  const el = document.getElementById('adminLog');
  if (!el) return;
  if (!S.answers.length) { el.textContent = 'No answers yet.'; return; }
  el.textContent = S.answers.map(a => {
    if (a.type === 'model-id') {
      return `V${a.vid}[${a.vM}] MODEL-ID: chose ${a.chosen} ${a.correct?'✓':'✗'}`;
    }
    return `V${a.vid}[${a.vM}] Q${a.qi+1} ${a.itemId}[${a.qM}] ${a.congruent?'CON':'INC'}: ${a.ans} key:${a.keyed} ${a.ok?'✓':'✗'}`;
  }).join('\n');
}

// ── CSV EXPORT (CHANGED — unified format with Type column) ──
function exportCSV() {
  const headers = [
    'ChildName','ChildAge','Type',
    'VignetteID','VignetteModel',
    'QuestionIndex','QuestionModel','ItemID','IsCongruent',
    'Answer','InitialYesNo','KeyedAnswer','Correct',
    'ModelIDChosen','ModelIDCorrect',
    'Timestamp'
  ];
  const rows = [headers.join(',')];
  S.answers.forEach(a => {
    if (a.type === 'model-id') {
      rows.push([
        S.name, S.age, 'MODEL_ID',
        a.vid, a.vM,
        '','','','',
        '','','','',
        a.chosen, a.correct ? 'TRUE' : 'FALSE',
        a.ts
      ].join(','));
    } else {
      rows.push([
        S.name, S.age, 'TEST_ITEM',
        a.vid, a.vM,
        a.qi+1, a.qM, a.itemId||'', a.congruent ? 'TRUE' : 'FALSE',
        a.ans, a.initialAns || (a.ans.includes('YES') ? 'YES' : 'NO'),
        a.keyed, a.ok ? 'TRUE' : 'FALSE',
        '','',
        a.ts
      ].join(','));
    }
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `RAD12C_${S.name||'child'}_age${S.age||'unknown'}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

    console.error(err);
  }
});

window.addEventListener('keydown', e => {
  if (e.key === 'Backspace' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') e.preventDefault();
});
